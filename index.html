<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; color: #0f6; }
        .card { width: 85%; max-width: 320px; padding: 30px; background: #0a0a0a; border: 2px solid #0f6; border-radius: 15px; text-align: center; box-shadow: 0 0 15px #0f65; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #111; border: 1px solid #0f6; border-radius: 8px; color: #fff; text-align: center; outline: none; }
        .btn { width: 100%; padding: 14px; background: #0f6; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn:disabled { background: #333; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-shadow: 0 0 10px #0f6;">NEXUS VIP</h2>
    <input type="text" id="keyInput" placeholder="SUA KEY AQUI">
    <button class="btn" id="btnEntrar" onclick="autenticar()">ENTRAR</button>
</div>

<script>
async function autenticar() {
    const key = document.getElementById('keyInput').value.trim().toUpperCase();
    const btn = document.getElementById('btnEntrar');
    
    // Pega o ID do celular ou usa um fixo para teste
    const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "PC_TESTE";

    if (!key) return alert("Digite a Key!");

    btn.disabled = true;
    btn.innerText = "CONECTANDO...";

    try {
        // Link direto para o arquivo verify.js na Vercel
        const response = await fetch("https://nexus-vip-key.vercel.app/api/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, hwid })
        });

        const result = await response.json();

        if (result.status === "valida") {
            if (typeof Android !== 'undefined') {
                Android.onLoginSuccess();
            } else {
                alert("LOGIN OK NO NAVEGADOR!");
            }
        } else {
            alert("NEGADO: " + (result.message || "Key Inválida"));
        }

    } catch (e) {
        // Mostra o erro exato para sabermos se é rede ou bloqueio
        alert("ERRO DE REDE: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "ENTRAR";
    }
}
</script>
</body>
</html>
