<!DOCTYPE html>
<html style="background-color: #080808;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #080808; color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; }

        .panel {
            width: 90%; max-width: 380px; background: #111; border: 1px solid #00ff66;
            border-radius: 25px; padding: 20px; box-shadow: 0 0 15px #00ff6633;
        }

        h2 { color: #00ff66; text-align: center; margin-bottom: 20px; font-size: 1.2rem; text-transform: uppercase; }

        .row {
            display: flex; justify-content: space-between; align-items: center;
            background: #1a1a1a; padding: 12px 18px; border-radius: 15px; margin-bottom: 10px;
        }

        /* Switch Profissional */
        .switch { position: relative; width: 42px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0; background: #333;
            transition: .3s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background: #fff; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background: #00ff66; }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-action {
            width: 100%; padding: 15px; background: #00ff66; color: #000; border: none;
            border-radius: 15px; font-weight: bold; margin-top: 10px; cursor: pointer;
        }

        #login-ui input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            border-radius: 12px; color: #00ff66; margin-bottom: 15px; text-align: center; outline: none;
        }

        #menu-ui { display: none; }
    </style>
</head>
<body>

<div class="panel">
    <div id="login-ui">
        <h2>NEXUS AUTH</h2>
        <input type="text" id="key" placeholder="SUA KEY">
        <button class="btn-action" onclick="logar()">ENTRAR NO PAINEL</button>
    </div>

    <div id="menu-ui">
        <h2>NEXUS MODS OB53</h2>
        
        <div class="row">
            <span>FLY HEIGHT</span>
            <label class="switch">
                <input type="checkbox" onchange="patch('FLY', '0x5ff59f4', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span>NO RECOIL</span>
            <label class="switch">
                <input type="checkbox" onchange="patch('RECOIL', '0x6accffc', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span>FAST MEDKIT</span>
            <label class="switch">
                <input type="checkbox" onchange="patch('KIT', '0x6a059d0', this)">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-action" onclick="Android.openGame()">ABRIR FREE FIRE MAX</button>
    </div>
</div>

<script>
    async function logar() {
        const key = document.getElementById('key').value.trim();
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB";

        const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
            method: "POST",
            headers: { "Content-Type": "application/json", "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw" },
            body: JSON.stringify({ key, hwid })
        });
        const data = await response.json();

        if (data.status === "valida") {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('menu-ui').style.display = 'block';
        } else {
            alert("KEY INVÁLIDA!");
        }
    }

    function patch(nome, offset, el) {
        let hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
        if(typeof Android !== 'undefined') Android.inject(nome, offset, hex);
    }
</script>

</body>
</html>
