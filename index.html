<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --matrix-green: #00ff41;
            --matrix-dark: #003b00;
            --panel-bg: rgba(5, 5, 5, 0.98);
        }

        body {
            background: transparent;
            margin: 0;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #matrix-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            border-radius: 15px;
        }

        .container {
            width: 290px;
            background: var(--panel-bg);
            border: 2px solid var(--matrix-green);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px var(--matrix-dark);
            text-align: center;
            position: relative;
        }

        h2 {
            color: var(--matrix-green);
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--matrix-green);
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin-bottom: 15px;
            background: #000;
            border: 1px solid var(--matrix-dark);
            color: var(--matrix-green);
            border-radius: 5px;
            text-align: center;
            outline: none;
            font-family: monospace;
        }

        .btn-main {
            width: 100%;
            padding: 12px;
            background: var(--matrix-dark);
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn-main:active { background: var(--matrix-green); color: #000; }

        /* Estilo das Funções */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 5px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
        }

        .row span { color: var(--matrix-green); font-size: 0.85rem; font-weight: bold; }

        /* Switches Matrix */
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { display: none; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #111; border-radius: 20px; transition: .4s; border: 1px solid var(--matrix-dark); }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 2px; background: var(--matrix-dark); transition: .4s; border-radius: 50%; }
        input:checked + .slider { border-color: var(--matrix-green); }
        input:checked + .slider:before { transform: translateX(20px); background: var(--matrix-green); box-shadow: 0 0 8px var(--matrix-green); }

        /* Botões de Jogo */
        .game-grid { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-game { flex: 1; padding: 10px; font-size: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }

        /* Controle de Telas */
        #menu { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <canvas id="matrix-canvas"></canvas>

        <div id="login-screen">
            <h2>NEXUS LOGIN</h2>
            <input type="text" id="keyInput" placeholder="SUA CHAVE AQUI">
            <button class="btn-main" id="btn-login" onclick="fazerLogin()">CONECTAR</button>
        </div>

        <div id="menu">
            <h2>NEXUS MODS</h2>
            
            <div class="game-grid">
                <button class="btn-game" style="background: #e91e63;" onclick="window.Android.openGame('com.dts.freefireth')">FF NORMAL</button>
                <button class="btn-game" style="background: #9c27b0;" onclick="window.Android.openGame('com.dts.freefiremax')">FF MAX</button>
            </div>

            <div class="row">
                <span>> AIMBOT</span>
                <label class="switch"><input type="checkbox" onchange="send('aimbot', this.checked)"><span class="slider"></span></label>
            </div>

            <div class="row">
                <span>> HEADSHOT</span>
                <label class="switch"><input type="checkbox" onchange="send('hs', this.checked)"><span class="slider"></span></label>
            </div>

            <div class="row">
                <span>> SPEED X10</span>
                <label class="switch"><input type="checkbox" onchange="send('speed', this.checked)"><span class="slider"></span></label>
            </div>

            <button onclick="location.reload()" style="background:transparent; border:none; color:red; margin-top:15px; font-size: 10px;">SAIR DO SISTEMA</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const hwid = params.get('hwid') || 'UNKNOWN';

        async function fazerLogin() {
            const k = document.getElementById('keyInput').value.trim();
            const btn = document.getElementById('btn-login');
            if(!k) return alert("Digite a Key!");

            btn.innerText = "VERIFICANDO...";

            try {
                // Chamada da API na Vercel
                const res = await fetch(`/api/verify?key=${k}&hwid=${hwid}`);
                const data = await res.json();

                if(data.success) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('menu').style.display = 'block';
                } else {
                    alert("ERRO: " + data.message);
                    btn.innerText = "CONECTAR";
                }
            } catch(e) {
                alert("ERRO DE CONEXÃO COM O SERVIDOR");
                btn.innerText = "CONECTAR";
            }
        }

        function send(f, s) {
            if(window.Android) window.Android.onFeatureToggle(f, s);
        }

        // Efeito Matrix
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 330; canvas.height = 450;
        const letters = "01";
        const fontSize = 10;
        const drops = Array(Math.floor(canvas.width/fontSize)).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
</html>
