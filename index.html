<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS MEGA V3</title>
    <style>
        :root { --neon: #00ffff; }
        body { background: #000; color: var(--neon); font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { width: 85%; max-width: 320px; padding: 35px; border: 2px solid var(--neon); border-radius: 20px; box-shadow: 0 0 25px rgba(0,255,255,0.4); text-align: center; background: #000; }
        h2 { text-shadow: 0 0 10px var(--neon); letter-spacing: 4px; margin: 0; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #0a0a0a; border: 1px solid var(--neon); color: #fff; text-align: center; border-radius: 8px; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: transparent; border: 2px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        button:hover { background: var(--neon); color: #000; }
        #status { margin-top: 20px; font-size: 11px; font-weight: bold; min-height: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>NEXUS MEGA</h2>
        <div style="font-size: 10px; opacity: 0.7; margin-bottom: 10px;">V3 - VERCEL INFRA</div>
        <input type="text" id="keyInput" placeholder="SUA CHAVE AQUI">
        <button onclick="executarLogin()">AUTENTICAR</button>
        <div id="status">AGUARDANDO...</div>
    </div>

    <script>
        async function executarLogin() {
            const status = document.getElementById('status');
            const key = document.getElementById('keyInput').value.trim();

            if(!key) {
                status.innerText = "DIGITE A KEY!";
                status.style.color = "red";
                return;
            }

            status.innerText = "VALIDANDO...";
            status.style.color = "#00ffff";

            try {
                // Tenta pegar o HWID da ponte Android
                let hwid = "BROWSER_TEST";
                if (typeof Android !== 'undefined') {
                    hwid = Android.getDeviceId();
                }

                const response = await fetch(`https://nexus-vip-key.vercel.app/api/verify?key=${key}&hwid=${hwid}`);
                const data = await response.json();

                if (data.success) {
                    status.innerText = "ACESSO LIBERADO!";
                    status.style.color = "#00ff00";
                    if (typeof Android !== 'undefined') {
                        setTimeout(() => { Android.onLoginSuccess(); }, 1000);
                    }
                } else {
                    status.innerText = "ERRO: " + data.message.toUpperCase();
                    status.style.color = "#ff4444";
                }
            } catch (err) {
                status.innerText = "ERRO DE CONEXÃO!";
                status.style.color = "yellow";
            }
        }
    </script>
</body>
</html>
