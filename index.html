<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --neon: #00ff41; }
        body { background: transparent; color: var(--neon); font-family: monospace; margin: 0; padding: 10px; }
        .menu-card { background: rgba(0, 0, 0, 0.9); border: 1.5px solid var(--neon); border-radius: 12px; padding: 15px; box-shadow: 0 0 15px var(--neon); }
        .title { text-align: center; font-weight: bold; font-size: 18px; margin-bottom: 15px; text-shadow: 0 0 5px var(--neon); }
        .switch-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 5px; border-bottom: 0.5px solid #113311; }
        
        /* Botão Estilo Toggle */
        .btn-inject { background: #111; border: 1px solid var(--neon); color: var(--neon); padding: 8px; border-radius: 5px; cursor: pointer; transition: 0.3s; width: 80px; font-size: 10px; }
        .btn-inject.active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }
        
        .footer { font-size: 9px; text-align: center; margin-top: 10px; color: #555; }
    </style>
</head>
<body>

<div class="menu-card">
    <div class="title">NEXUS INJECTOR v3</div>
    
    <div class="switch-container">
        <span>AIMLOCK 100%</span>
        <button class="btn-inject" id="aim" onclick="toggle('AIM', '0x336371c', '0000A0E3', 'aim')">OFF</button>
    </div>

    <div class="switch-container">
        <span>ANTENA HEAD</span>
        <button class="btn-inject" id="ant" onclick="toggle('ANTENA', '0x3357530', '0100A0E3', 'ant')">OFF</button>
    </div>

    <div class="switch-container">
        <span>NO RECOIL</span>
        <button class="btn-inject" id="rec" onclick="toggle('RECOIL', '0x68a10dc', '0000A0E3', 'rec')">OFF</button>
    </div>

    <button onclick="Android.abrirJogo()" style="width: 100%; background: var(--neon); color: #000; border: none; padding: 10px; margin-top: 10px; border-radius: 5px; font-weight: bold;">INICIAR GAME</button>
    
    <div class="footer">PROTECTED BY HWID & SUPABASE</div>
</div>

<script>
    function toggle(nome, offset, hex, id) {
        const btn = document.getElementById(id);
        const isActivating = btn.innerText === "OFF";
        
        if (typeof Android !== 'undefined') {
            // Chama a função de injeção real no Java
            Android.injectCode(nome, offset, hex, isActivating);
            
            // Atualiza o visual do botão
            btn.innerText = isActivating ? "ON" : "OFF";
            btn.classList.toggle('active');
        }
    }
</script>

</body>
</html>
