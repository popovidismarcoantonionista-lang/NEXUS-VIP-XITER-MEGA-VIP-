<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS LOGIN</title>
    <style>
        /* ... Seu CSS original aqui ... */
        /* Pequeno ajuste para o botão não parecer travado durante a verificação */
        .key-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="login-box">
    <div class="title">NEXUS XITER 😈</div>
    <div class="subtitle">SECURE LOGIN SYSTEM</div>

    <div class="input-box">
        <input type="text" id="keyInput" placeholder="SUA KEY (VIP)">
    </div>

    <button class="key-btn" id="loginBtn" onclick="login()">
        ENTER PANEL
    </button>

    <div class="success" id="successBox">
        LOGIN SUCCESSFUL • ACCESS GRANTED
    </div>

    <div class="footer">
        PROTECTED LOGIN SYSTEM v5.0
    </div>
</div>

<script>
async function login() {
    const key = document.getElementById('keyInput').value.trim();
    const btn = document.getElementById('loginBtn');
    const success = document.getElementById('successBox');

    if (!key) {
        alert('POR FAVOR, INSIRA SUA KEY');
        return;
    }

    // Bloqueia o botão para evitar cliques duplos
    btn.disabled = true;
    btn.innerText = "VERIFICANDO...";

    try {
        // 1. Pega o HWID real do Android através da ponte que criamos no Sketchware
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "PC-BROWSER";

        // 2. Chama sua API na Vercel (substitua pela sua URL real)
        const response = await fetch(`https://SUA-API-NA-VERCEL.vercel.app/api/handler?key=${key}&hwid=${hwid}`);
        const result = await response.json();

        if (result.success) {
            success.style.display = 'block';
            btn.innerText = "ACESSO LIBERADO";
            
            // 3. Avisa o Java que o login foi um sucesso para abrir o Floating ou redirecionar
            setTimeout(() => {
                if (typeof Android !== 'undefined') {
                    Android.onLoginSuccess(); 
                } else {
                    // Fallback para teste no navegador
                    window.location.href = "sucesso.login.html";
                }
            }, 1500);
        } else {
            alert("ERRO: " + result.message);
            btn.disabled = false;
            btn.innerText = "ENTER PANEL";
        }
    } catch (err) {
        alert("ERRO DE CONEXÃO COM O SERVIDOR");
        btn.disabled = false;
        btn.innerText = "ENTER PANEL";
    }
}

// Seu script do Matrix continua igual aqui embaixo...
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const letters = 'NEXUS101010101';
const fontSize = 14;
const columns = canvas.width/fontSize;
const drops = [];
for(let x = 0; x < columns; x++) drops[x] = 1;
function draw(){
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00ff66';
    ctx.font = fontSize + 'px monospace';
    for(let i = 0; i < drops.length; i++){
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, drops[i]*fontSize);
        if(drops[i]*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    }
}
setInterval(draw, 35);
</script>

</body>
</html>
