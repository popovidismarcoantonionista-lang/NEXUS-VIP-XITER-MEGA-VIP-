<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP LOGIN</title>
    <style>
        /* DESIGN DO PAINEL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: #000; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #0f6;
        }

        .login-card {
            width: 85%;
            max-width: 300px;
            padding: 25px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #0f6;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
        }

        h2 { margin-bottom: 20px; font-size: 1.5rem; text-shadow: 0 0 10px #0f6; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #0f6;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #0f6;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:disabled { background: #444; color: #888; }

        #menu-area { display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <div id="login-area">
        <h2>NEXUS VIP</h2>
        <input type="text" id="keyInput" placeholder="INSIRA SUA KEY">
        <button class="btn" id="btnEntrar" onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="menu-area">
        <h2>BEM-VINDO</h2>
        <p style="color: #fff; margin-bottom: 15px; font-size: 13px;">SISTEMA ATIVADO</p>
        <button class="btn" onclick="abrirJogo()">ABRIR FREE FIRE</button>
    </div>
</div>

<script>
    async function fazerLogin() {
        const key = document.getElementById('keyInput').value.trim();
        const btn = document.getElementById('btnEntrar');

        if (!key) return alert("Por favor, digite uma key!");

        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";

        // Pega o HWID do celular via Sketchware
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "PC-TESTE";

        try {
            // O LINK QUE FUNCIONOU NO SEU TESTE
            const url = `https://nexus-vip-key.vercel.app/api/verify?key=${key}&hwid=${hwid}`;
            const response = await fetch(url);
            const result = await response.json();

            if (result.success) {
                document.getElementById('login-area').style.display = 'none';
                document.getElementById('menu-area').style.display = 'block';
            } else {
                alert("ERRO: " + result.message);
                btn.disabled = false;
                btn.innerText = "Entrar";
            }
        } catch (error) {
            alert("Falha na conexão com o servidor. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "Entrar";
        }
    }

    function abrirJogo() {
        // Função que você vai configurar no Sketchware para injetar o mod
        if (typeof Android !== 'undefined') {
            Android.openGame(); 
        } else {
            alert("Este botão só funciona dentro do App!");
        }
    }
</script>

</body>
</html>
