<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --green: #00ff41; --dark: #000; }
        body { background: transparent; margin: 0; padding: 10px; font-family: monospace; overflow: hidden; }
        #canvas { position: absolute; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; border-radius: 15px; }
        .panel { background: rgba(0,0,0,0.95); border: 2px solid var(--green); border-radius: 15px; padding: 15px; text-align: center; color: var(--green); box-shadow: 0 0 15px var(--green); }
        input { width: 85%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--green); color: var(--green); text-align: center; }
        button { width: 100%; padding: 10px; background: var(--green); border: none; color: #000; font-weight: bold; margin-bottom: 5px; cursor: pointer; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(0,255,65,0.2); }
        #menu { display: none; }
    </style>
</head>
<body>
    <div class="panel">
        <canvas id="canvas"></canvas>
        <div id="login">
            <h2>NEXUS LOGIN</h2>
            <input type="text" id="key" placeholder="LICENÇA">
            <button onclick="login()">ACESSAR</button>
        </div>
        <div id="menu">
            <h2>MATRIX MODS</h2>
            <div style="display:flex; gap:5px">
                <button style="background:orange; font-size:10px" onclick="window.Android.openGame('com.dts.freefireth')">FF</button>
                <button style="background:purple; font-size:10px" onclick="window.Android.openGame('com.dts.freefiremax')">MAX</button>
            </div>
            <div class="row"><span>AIMBOT</span><input type="checkbox" onchange="send('aimbot', this.checked)"></div>
            <div class="row"><span>HEADSHOT</span><input type="checkbox" onchange="send('hs', this.checked)"></div>
        </div>
    </div>

    <script>
        const hwid = new URLSearchParams(window.location.search).get('hwid');
        async function login() {
            const k = document.getElementById('key').value;
            const res = await fetch(`/api/verify?key=${k}&hwid=${hwid}`);
            const data = await res.json();
            if(data.success) { 
                document.getElementById('login').style.display='none';
                document.getElementById('menu').style.display='block';
            } else { alert("KEY INVÁLIDA!"); }
        }
        function send(f, s) { if(window.Android) window.Android.onFeatureToggle(f, s); }

        // Efeito Matrix Simples
        const c = document.getElementById('canvas');
        const ctx = c.getContext('2d');
        const drops = Array(30).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0,0,0,0.05)";
            ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#0f0";
            drops.forEach((y, i) => {
                ctx.fillText("01", i * 10, y * 10);
                if(y*10 > c.height && Math.random() > 0.9) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    </script>
</body>
</html>
