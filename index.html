<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS VIP</title>

<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Courier New', monospace; }
    
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #050505;
        overflow: hidden;
    }

    canvas { position: fixed; inset: 0; z-index: -1; }

    /* PAINEL COM BORDA RGB */
    .login-box {
        width: 92%;
        max-width: 390px;
        background: rgba(13, 13, 13, 0.95);
        border: 2px solid #00ff66;
        border-radius: 24px;
        padding: 28px 22px;
        box-shadow: 0 0 25px rgba(0,255,100,.4);
        animation: glow 4s linear infinite;
        z-index: 10;
    }

    @keyframes glow {
        0%, 100% { border-color: #00ff66; box-shadow: 0 0 20px #00ff66; }
        33% { border-color: #00ffff; box-shadow: 0 0 20px #00ffff; }
        66% { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; }
    }

    .title { text-align:center; font-size:1.8rem; font-weight:bold; color:#00ff66; text-shadow:0 0 12px #00ff66; margin-bottom: 5px; }
    .subtitle { text-align:center; font-size:.75rem; color:#888; margin-bottom:25px; letter-spacing: 2px; }

    .input-box { margin-bottom: 15px; }
    .input-box input {
        width: 100%; height: 50px; background: #080808; border: 1px solid #333;
        border-radius: 12px; padding: 0 15px; color: #00ff66; outline: none; transition: 0.3s;
    }
    .input-box input:focus { border-color: #00ff66; box-shadow: 0 0 10px rgba(0,255,100,0.2); }

    .key-btn {
        width: 100%; height: 55px; border: none; border-radius: 14px;
        font-size: 1.1rem; font-weight: bold; color: #000; cursor: pointer;
        background: linear-gradient(90deg, #00ff66, #00ffff, #ff00ff, #00ff66);
        background-size: 400% 400%; animation: rgb-bg 6s linear infinite;
    }

    @keyframes rgb-bg { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

    /* ESTILO DAS FUNÇÕES (MENU) */
    #menu-ui { display: none; }
    .feature {
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(255,255,255,0.05); padding: 12px 15px;
        border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #00ff66;
    }
    .feature span { color: #fff; font-size: 0.9rem; }

    /* SWITCH ESTILO IOS */
    .switch { position: relative; width: 45px; height: 22px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: #333; border-radius: 34px; transition: .4s; }
    .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background: #00ff66; }
    input:checked + .slider:before { transform: translateX(23px); }

    .footer { margin-top: 15px; text-align: center; font-size: .65rem; color: #444; }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="login-box">
    <div id="login-ui">
        <div class="title">NEXUS XITER 😈</div>
        <div class="subtitle">SECURE LOGIN SYSTEM</div>
        <div class="input-box"><input type="text" id="user" placeholder="USERNAME"></div>
        <div class="input-box"><input type="text" id="keyInput" placeholder="ACCESS KEY"></div>
        <button class="key-btn" onclick="login()">ENTER PANEL</button>
    </div>

    <div id="menu-ui">
        <div class="title" style="font-size: 1.4rem;">NEXUS MENU</div>
        <div class="subtitle">DUMP OB53 ATIVO</div>
        
        <div class="feature">
            <span>AIMLOCK 100%</span>
            <label class="switch"><input type="checkbox" onchange="patch('Aim', '0x5ff59f4', this)"><span class="slider"></span></label>
        </div>

        <div class="feature">
            <span>NO RECOIL</span>
            <label class="switch"><input type="checkbox" onchange="patch('Recoil', '0x6accffc', this)"><span class="slider"></span></label>
        </div>

        <div class="feature">
            <span>FAST MEDKIT</span>
            <label class="switch"><input type="checkbox" onchange="patch('Medkit', '0x6a059d0', this)"><span class="slider"></span></label>
        </div>

        <button class="key-btn" style="height: 45px; margin-top: 15px; font-size: 0.9rem;" onclick="Android.openGame()">INICIAR JOGO</button>
    </div>

    <div class="footer">PROTECTED BY NEXUS VIP • v5.0</div>
</div>

<script>
    // LÓGICA DE LOGIN
    function login() {
        const key = document.getElementById('keyInput').value;
        if(key.length >= 4) {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('menu-ui').style.display = 'block';
            
            // Chama o comando no Sketchware
            if(typeof Android !== 'undefined') {
                Android.onLoginSuccess();
            }
        } else {
            alert('KEY INVÁLIDA!');
        }
    }

    // COMANDO DE INJEÇÃO
    function patch(nome, offset, el) {
        const hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
        if(typeof Android !== 'undefined') {
            Android.inject(nome, offset, hex);
        }
    }

    // EFEITO MATRIX
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const letters = 'NEXUS1010101';
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);

    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.08)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff66';
        ctx.font = fontSize + 'px monospace';
        for(let i = 0; i < drops.length; i++) {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        }
    }
    setInterval(draw, 35);
</script>

</body>
</html>
