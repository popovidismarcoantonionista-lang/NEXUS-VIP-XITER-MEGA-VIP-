<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS LOGIN VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { height: 100vh; display: flex; justify-content: center; align-items: center; background: #050505; overflow: hidden; }
        canvas { position: fixed; inset: 0; z-index: -1; }
        .login-box {
            width: 90%; max-width: 380px; background: rgba(13, 13, 13, 0.9);
            border: 2px solid #00ff66; border-radius: 20px; padding: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.3); text-align: center;
        }
        .title { color: #00ff66; font-size: 2rem; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px #00ff66; }
        .input-box { margin-bottom: 20px; }
        .input-box input {
            width: 100%; height: 50px; background: #000; border: 1px solid #00ff66;
            border-radius: 10px; color: #00ff66; padding: 0 15px; outline: none; font-size: 1rem;
        }
        .key-btn {
            width: 100%; height: 55px; border: none; border-radius: 10px;
            background: #00ff66; color: #000; font-weight: bold; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s;
        }
        .key-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="login-box">
    <div class="title">NEXUS VIP</div>
    <p style="color: #888; font-size: 0.8rem; margin-bottom: 20px;">SECURITY AUTHENTICATION</p>
    
    <div class="input-box">
        <input type="text" id="keyInput" placeholder="INSIRA SUA KEY">
    </div>

    <button class="key-btn" id="btnEntrar" onclick="autenticar()">ENTER PANEL</button>
</div>

<script>
async function autenticar() {
  const keyField = document.getElementById('keyInput');
  const key = keyField.value.trim().toUpperCase();
  const btn = document.getElementById('btnEntrar');
  
  // Pega o HWID real do celular via Ponte Java
  const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "Navegador_Teste";

  if(!key) return alert("INSIRA UMA KEY!");

  btn.innerText = "VERIFICANDO...";
  btn.disabled = true;

  try {
    const response = await fetch(
      "https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw"
        },
        body: JSON.stringify({ key, hwid })
      }
    );
    const result = await response.json();

    if (result.status === "valida") {
      if (typeof Android !== 'undefined') Android.onLoginSuccess();
      else alert("LOGIN REALIZADO COM SUCESSO!");
    } else if (result.status === "expirada") {
      alert("ERRO: KEY EXPIRADA!");
      btn.disabled = false;
      btn.innerText = "ENTER PANEL";
    } else {
      alert("ERRO: KEY OU HWID INVÁLIDOS!");
      btn.disabled = false;
      btn.innerText = "ENTER PANEL";
    }
  } catch (e) {
    alert("ERRO DE CONEXÃO: " + e.message);
    btn.disabled = false;
    btn.innerText = "ENTER PANEL";
  }
}

// Efeito Matrix
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const letters = 'NEXUS0101';
const fontSize = 16;
const columns = canvas.width/fontSize;
const drops = Array(Math.floor(columns)).fill(1);
function draw(){
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00ff66';
    ctx.font = fontSize + 'px monospace';
    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i*fontSize, y*fontSize);
        if(y*fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(draw, 35);
</script>
</body>
</html>
