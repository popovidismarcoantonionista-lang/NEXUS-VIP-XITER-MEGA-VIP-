<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NEXUS LOGIN VIP</title>

<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Courier New', monospace; }

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050505;
    overflow:hidden;
}

canvas{ position:fixed; inset:0; z-index:-1; }

.login-box{
    width:92%;
    max-width:390px;
    background:rgba(13, 13, 13, 0.95);
    border:2px solid #00ff66;
    border-radius:24px;
    padding:28px 22px;
    box-shadow:0 0 25px rgba(0,255,100,.4);
    animation:glow 4s linear infinite;
    backdrop-filter: blur(10px);
}

@keyframes glow{
    0%, 100% {border-color: #00ff66; box-shadow: 0 0 20px #00ff66;}
    50% {border-color: #00ffff; box-shadow: 0 0 20px #00ffff;}
}

.title{
    text-align:center;
    font-size:2.2rem;
    font-weight:bold;
    margin-bottom:8px;
    color:#00ff66;
    text-shadow:0 0 15px #00ff66;
}

.subtitle{
    text-align:center;
    font-size:.75rem;
    color:#888;
    margin-bottom:28px;
    letter-spacing: 1px;
}

.input-box{ margin-bottom:18px; }

.input-box input{
    width:100%;
    height:55px;
    background:#080808;
    border:1px solid #00ff66;
    border-radius:14px;
    padding:0 15px;
    font-size:1rem;
    color:#00ff66;
    outline:none;
    transition: 0.3s;
}

.input-box input:focus{ box-shadow:0 0 15px rgba(0,255,100,0.5); }

.key-btn{
    width:100%;
    height:56px;
    border:none;
    border-radius:14px;
    font-size:1.1rem;
    font-weight:bold;
    background:linear-gradient(90deg,#00ff66,#00ffff,#ff00ff,#00ff66);
    background-size:400% 400%;
    animation:rgb 6s linear infinite;
    color:#000;
    margin-top:8px;
    cursor:pointer;
    transition: 0.3s;
}

.key-btn:disabled { opacity: 0.5; cursor: not-allowed; }

@keyframes rgb{
    0%{background-position:0% 50%;}
    100%{background-position:400% 50%;}
}

.success{
    margin-top:18px;
    padding:14px;
    border-radius:12px;
    background:rgba(0, 255, 100, 0.1);
    color:#00ff66;
    font-size:.85rem;
    text-align:center;
    border:1px solid #00ff66;
    display:none;
}

.footer{
    margin-top:18px;
    text-align:center;
    font-size:.7rem;
    color:#555;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="login-box">
    <div class="title">NEXUS VIP</div>
    <div class="subtitle">AUTHENTICATION SYSTEM</div>

    <div class="input-box">
        <input type="text" id="keyInput" placeholder="ENTER ACCESS KEY">
    </div>

    <button class="key-btn" id="loginBtn" onclick="login()">
        CONNECT TO SERVER
    </button>

    <div class="success" id="successBox">
        ACCESS GRANTED • OPENING MENU...
    </div>

    <div class="footer">
        NEXUS PROTECT v5.2 • SECURE HWID LOCK
    </div>
</div>

<script>
async function login() {
    const keyField = document.getElementById('keyInput');
    const key = keyField.value.trim();
    const btn = document.getElementById('loginBtn');
    const success = document.getElementById('successBox');

    if (!key) {
        alert('ERRO: Insira uma Key válida!');
        return;
    }

    // Desativa botão para evitar spam
    btn.disabled = true;
    btn.innerText = "VERIFYING...";

    try {
        // PEGA O HWID DO ANDROID (Ponte Java)
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "TEST_DEVICE_123";

        // VERIFICA NA SUA VERCEL (Ajuste para sua URL real aqui)
        const apiUrl = `https://SEU-PROJETO.vercel.app/api/handler?key=${key}&hwid=${hwid}`;
        
        const response = await fetch(apiUrl);
        const result = await response.json();

        if (result.success) {
            success.style.display = 'block';
            btn.innerText = "AUTHORIZED";
            
            // CHAMA O JAVA PARA ABRIR O FLOATING
            setTimeout(() => {
                if (typeof Android !== 'undefined') {
                    Android.onLoginSuccess();
                } else {
                    alert("Sucesso! (Rodando no Navegador)");
                }
            }, 1500);
            
        } else {
            alert("ERRO: " + result.message);
            btn.disabled = false;
            btn.innerText = "CONNECT TO SERVER";
        }
    } catch (err) {
        alert("ERRO DE CONEXÃO: Verifique sua internet!");
        btn.disabled = false;
        btn.innerText = "CONNECT TO SERVER";
    }
}

// MATRIX BACKGROUND EFFECT
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = 'NEXUS010101';
const fontSize = 14;
const columns = canvas.width/fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function draw(){
    ctx.fillStyle = 'rgba(0,0,0,0.06)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00ff66';
    ctx.font = fontSize + 'px monospace';

    drops.forEach((y, i) => {
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text, i * fontSize, y * fontSize);
        if(y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
    });
}
setInterval(draw, 35);
</script>

</body>
</html>
