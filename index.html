<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS VIP LOGIN</title>
    <style>
        body { background: #000; color: #0f6; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #0f6; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px #0f6; text-align: center; background: rgba(0,0,0,0.8); }
        input { background: #000; border: 1px solid #0f6; color: #0f6; padding: 10px; border-radius: 5px; margin-bottom: 15px; width: 80%; outline: none; }
        button { background: #0f6; color: #000; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>
    <canvas id="m"></canvas>
    <div class="box">
        <h2>NEXUS VIP</h2>
        <input type="text" id="keyInput" placeholder="DIGITE SUA KEY">
        <br>
        <button id="btn" onclick="autenticar()">LOGIN</button>
    </div>

    <script>
    async function autenticar() {
      const key = document.getElementById('keyInput').value.trim().toUpperCase();
      const btn = document.getElementById('btn');
      
      // Pega o ID via ponte Java
      const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "PC_DEBUG";

      if(!key) return alert("INSIRA A KEY!");
      btn.innerText = "AGUARDE...";

      try {
        const response = await fetch(
          "https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key",
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw"
            },
            body: JSON.stringify({ key, hwid })
          }
        );
        const result = await response.json();

        if (result.status === "valida") {
          if (typeof Android !== 'undefined') Android.onLoginSuccess();
          else alert("KEY VÁLIDA!");
        } else {
          alert("ERRO: " + result.status.toUpperCase());
          btn.innerText = "LOGIN";
        }
      } catch (e) {
        alert("ERRO DE CONEXÃO!");
        btn.innerText = "LOGIN";
      }
    }

    // Efeito Matrix Simples
    const c = document.getElementById('m');
    const q = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const s = Array(256).fill(0);
    setInterval(() => {
        q.fillStyle = 'rgba(0,0,0,0.05)'; q.fillRect(0,0,c.width,c.height);
        q.fillStyle = '#0f6';
        s.forEach((y, i) => {
            q.fillText(String.fromCharCode(33+Math.random()*96), i*10, y);
            s[i] = y > 758 + Math.random()*1e4 ? 0 : y + 10;
        });
    }, 33);
    </script>
</body>
</html>
