<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        body { 
            background: #000; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #0f6;
        }

        .login-card {
            width: 85%;
            max-width: 300px;
            padding: 25px;
            background: rgba(0,0,0,0.9);
            border: 2px solid #0f6;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
        }

        h2 { margin-bottom: 20px; text-shadow: 0 0 10px #0f6; }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #0f6;
            border-radius: 8px;
            color: #fff;
            text-align: center;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #0f6;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h2>NEXUS VIP</h2>
    <input type="text" id="keyInput" placeholder="SUA KEY AQUI">
    <button class="btn" onclick="autenticar()">ENTRAR</button>
</div>

<script>
async function autenticar() {
  const key = document.getElementById('keyInput').value.trim().toUpperCase();
  const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "Navegador";

  // Alerta visual de carregamento
  console.log("Verificando...");

  try {
    const response = await fetch(
      "https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw"
        },
        body: JSON.stringify({ key, hwid })
      }
    );
    const result = await response.json();

    if (result.status === "valida") {
      if (typeof Android !== 'undefined') {
          Android.onLoginSuccess();
      } else {
          alert("KEY VÁLIDA (Teste no Navegador)");
      }
    } else if (result.status === "expirada") {
      alert("KEY EXPIRADA");
    } else {
      alert("KEY INVÁLIDA");
    }
  } catch (e) {
    alert("ERRO DE CONEXÃO: " + e.message);
  }
}
</script>

</body>
</html>
