<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP LOGIN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; color: #0f6; overflow: hidden; }
        
        .card { 
            width: 85%; 
            max-width: 320px; 
            padding: 35px 25px; 
            background: rgba(10, 10, 10, 0.95); 
            border: 2px solid #0f6; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.3); 
        }

        h2 { margin-bottom: 25px; text-shadow: 0 0 12px #0f6; letter-spacing: 2px; }

        input { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 20px; 
            background: #111; 
            border: 1px solid #0f6; 
            border-radius: 10px; 
            color: #fff; 
            text-align: center; 
            font-size: 16px; 
            outline: none; 
        }

        .btn { 
            width: 100%; 
            padding: 15px; 
            background: #0f6; 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        .status-msg { margin-top: 15px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

<div class="card">
    <h2>NEXUS VIP</h2>
    <input type="text" id="keyInput" placeholder="DIGITE SUA CHAVE">
    <button class="btn" id="btnEntrar" onclick="autenticar()">ENTRAR NO MOD</button>
    <p class="status-msg">v2.0 Unificado</p>
</div>

<script>
async function autenticar() {
    const keyInput = document.getElementById('keyInput');
    const btn = document.getElementById('btnEntrar');
    
    const key = keyInput.value.trim().toUpperCase();
    const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "PC_TESTE";

    if (!key) {
        alert("⚠️ Insira uma chave válida!");
        return;
    }

    btn.disabled = true;
    btn.innerText = "AUTENTICANDO...";

    try {
        const response = await fetch("https://nexus-vip-key.vercel.app/api/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, hwid })
        });

        const result = await response.json();

        if (result && result.status === "valida") {
            // --- REDIRECIONAMENTO PARA O MOD MENU ---
            if (typeof Android !== 'undefined') {
                // Chama a função Java no Sketchware que abre o menu flutuante
                Android.onLoginSuccess(); 
            } else {
                alert("✅ SUCESSO! No App, o menu abriria agora.");
            }
        } else {
            alert("❌ ACESSO NEGADO: " + (result.message || "Key Inválida"));
            btn.disabled = false;
            btn.innerText = "ENTRAR NO MOD";
        }

    } catch (e) {
        alert("🚨 ERRO DE CONEXÃO: Verifique sua internet ou a Vercel.");
        btn.disabled = false;
        btn.innerText = "ENTRAR NO MOD";
    }
}
</script>

</body>
</html>
