<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --matrix: #00ff41; }
        body { background: transparent; margin: 0; padding: 10px; font-family: monospace; overflow: hidden; }
        
        /* Garantir que o painel apareça sobre a tela branca */
        .panel { 
            background: rgba(0, 0, 0, 0.95); 
            border: 2px solid var(--matrix); 
            border-radius: 15px; 
            padding: 15px; 
            color: var(--matrix);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
            position: relative;
            z-index: 5;
        }

        #matrix-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; /* Atrás dos botões */
            opacity: 0.3;
        }

        .content { position: relative; z-index: 10; } /* Conteúdo sempre no topo */

        input { 
            width: 85%; padding: 12px; margin: 10px 0; 
            background: #000; border: 1px solid var(--matrix); 
            color: var(--matrix); text-align: center; border-radius: 5px;
        }

        button { 
            width: 100%; padding: 12px; background: var(--matrix); 
            border: none; color: #000; font-weight: bold; 
            border-radius: 5px; cursor: pointer;
        }

        #menu { display: none; } /* Começa escondido */
    </style>
</head>
<body>

    <div class="panel">
        <canvas id="matrix-canvas"></canvas>
        
        <div class="content" id="login-screen">
            <h3>NEXUS SYSTEM</h3>
            <input type="text" id="key" placeholder="INSIRA A CHAVE">
            <button onclick="fazerLogin()">AUTENTICAR</button>
        </div>

        <div class="content" id="menu">
            <h3>MOD MENU</h3>
            <button style="background:orange; margin-bottom:10px;" onclick="window.Android.openGame('com.dts.freefireth')">FREE FIRE</button>
            <div style="display:flex; justify-content:space-between; padding: 10px 0;">
                <span>AIMBOT</span>
                <input type="checkbox" onchange="send('aimbot', this.checked)">
            </div>
            <button onclick="location.reload()" style="background:transparent; color:red; border:1px solid red; margin-top:10px;">SAIR</button>
        </div>
    </div>

    <script>
        const hwid = new URLSearchParams(window.location.search).get('hwid');

        async function fazerLogin() {
            const k = document.getElementById('key').value;
            if(!k) return;
            try {
                const res = await fetch(`/api/verify?key=${k}&hwid=${hwid}`);
                const data = await res.json();
                if(data.success) {
                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('menu').style.display = 'block';
                } else {
                    alert(data.message);
                }
            } catch(e) { alert("Erro de conexão com a API"); }
        }

        function send(f, s) { if(window.Android) window.Android.onFeatureToggle(f, s); }

        // Script Matrix ultra-leve
        const c = document.getElementById('matrix-canvas');
        const ctx = c.getContext('2d');
        c.width = 300; c.height = 400;
        const drops = Array(20).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0,0,0,0.1)";
            ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#0f0";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*15, y*15);
                if(y*15 > c.height && Math.random() > 0.95) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    </script>
</body>
</html>
