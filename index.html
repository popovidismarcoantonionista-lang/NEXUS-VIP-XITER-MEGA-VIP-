<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
        
        /* Fundo escuro igual da foto */
        body { 
            height:100vh; 
            display:flex; 
            justify-content:center; 
            align-items:center; 
            overflow:hidden; 
            background:#050505; 
            color:white; 
        }
        
        /* Container Principal */
        .container {
            position: relative;
            width: 92%;
            max-width: 390px;
            padding: 3px; /* Espaço para a borda RGB aparecer */
            z-index: 1;
        }

        /* **O EFEITO RGB PREMIUM** */
        .container::after {
            content: "";
            position: absolute;
            top: -3px;
            left: -3px;
            width: calc(100% + 6px);
            height: calc(100% + 6px);
            background: linear-gradient(135deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3);
            background-size: 300% 300%;
            border-radius: 30px;
            z-index: -1;
            /* Brilho neon (shadow) */
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4), 0 0 30px rgba(0, 170, 255, 0.3);
            /* Animação que faz as cores girarem */
            animation: move-rgb 6s linear infinite alternate;
        }

        /* Animação que move o degradê */
        @keyframes move-rgb {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }

        /* O Painel de Login de fato (dentro da borda) */
        .panel {
            background:rgba(20,20,20,0.9);
            backdrop-filter:blur(10px);
            border-radius:28px;
            padding:22px;
            text-align:center;
        }

        /* Estilos do Login (mantidos e ajustados) */
        .logo { text-align:center; margin-bottom:25px; }
        .logo-circle {
            width:70px; height:70px; border-radius:50%; background:linear-gradient(135deg,#00ff88,#00aaff);
            margin:0 auto; display:flex; justify-content:center; align-items:center;
            font-size:28px; font-weight:bold; color:#000; box-shadow:0 0 20px rgba(0,255,136,0.3);
        }

        .input-box input {
            width:100%; height:55px; background:#000; border:1px solid #333;
            border-radius:15px; padding:0 18px; color:#00ff88; outline:none; margin-bottom:20px;
        }

        .btn {
            width:100%; height:55px; border:none; border-radius:15px;
            background:linear-gradient(135deg,#00ff88,#00d26f); color:#000;
            font-weight:bold; cursor:pointer; text-transform:uppercase; transition: 0.3s;
        }

        .btn:active { transform: scale(0.98); }

    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div id="login-ui">
            <div class="logo">
                <div class="logo-circle">N</div>
                <h2 style="margin-top:10px; letter-spacing:2px;">NEXUS VIP</h2>
            </div>
            <div class="input-box"><input type="text" id="key" placeholder="SUA KEY"></div>
            <button class="btn" onclick="logar()">ENTRAR</button>
        </div>
    </div>
</div>

<script>
    // A função de login permanece a mesma (comunicação com Supabase ou local)
    // ...
</script>

</body>
</html>
