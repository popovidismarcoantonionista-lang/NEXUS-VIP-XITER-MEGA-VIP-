<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP</title>
    <style>
        /* CENTRALIZAÇÃO TOTAL E DESIGN */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        
        body { 
            background: #000; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            color: #0f6;
        }

        .container {
            width: 85%;
            max-width: 320px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0f6;
            border-radius: 15px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 0 15px #0f63;
        }

        h2 { margin-bottom: 20px; text-shadow: 0 0 10px #0f6; }

        input {
            width: 100%;
            padding: 12px;
            background: #111;
            border: 1px solid #0f6;
            border-radius: 5px;
            color: #fff;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #0f6;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:disabled { background: #555; }

        #menu-ui { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-ui">
        <h2>NEXUS LOGIN</h2>
        <input type="text" id="key" placeholder="SUA KEY AQUI">
        <button class="btn" id="btnEntrar" onclick="autenticar()">ENTRAR</button>
    </div>

    <div id="menu-ui">
        <h2>MOD MENU</h2>
        <p style="color:#fff; font-size: 12px; margin-bottom: 15px;">CONECTADO COM SUCESSO</p>
        <button class="btn" onclick="Android.openGame()">ABRIR FREE FIRE</button>
    </div>
</div>

<script>
    async function autenticar() {
        const keyInput = document.getElementById('key').value.trim();
        const btn = document.getElementById('btnEntrar');

        if (!keyInput) return alert("Digite a Key!");

        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";

        // Pega o HWID do Sketchware via ponte Java
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "NAVEGADOR";

        try {
            // USANDO O NOVO LINK DA VERCEL (Ajustado para a pasta /api)
            const response = await fetch(`https://nexus-vip-key.vercel.app/api?key=${keyInput}&hwid=${hwid}`);
            
            // Se o servidor retornar 404 aqui, o problema ainda é a pasta na Vercel
            if (!response.ok) throw new Error("Erro 404 no Servidor");

            const result = await response.json();

            if (result.success) {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
            } else {
                alert("ERRO: " + result.message);
                btn.disabled = false;
                btn.innerText = "ENTRAR";
            }
        } catch (e) {
            alert("⚠️ FALHA DE CONEXÃO: O link da API ainda está dando 404 na Vercel!");
            btn.disabled = false;
            btn.innerText = "ENTRAR";
        }
    }
</script>

</body>
</html>
