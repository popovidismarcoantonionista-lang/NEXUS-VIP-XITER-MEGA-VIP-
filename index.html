<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: #050505; color: #00ff66; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.5; }

        .container {
            width: 90%; max-width: 380px; background: rgba(10, 10, 10, 0.98);
            border: 2px solid #00ff66; border-radius: 25px; padding: 30px;
            box-shadow: 0 0 25px rgba(0, 255, 100, 0.4); text-align: center;
        }

        .title { font-size: 2rem; font-weight: bold; margin-bottom: 25px; text-shadow: 0 0 10px #00ff66; }

        /* Estilo Login */
        #login-ui input {
            width: 100%; height: 55px; background: #000; border: 1px solid #00ff66;
            border-radius: 12px; padding: 0 15px; color: #00ff66; outline: none; margin-bottom: 20px; text-align: center;
        }

        .btn-main {
            width: 100%; height: 55px; border: none; border-radius: 12px; font-weight: bold;
            background: linear-gradient(90deg, #00ff66, #00ffff, #ff00ff, #00ff66);
            background-size: 400%; animation: rgb 6s linear infinite; color: #000; cursor: pointer;
        }

        /* Estilo Menu */
        #menu-ui { display: none; }
        .hack-card {
            background: #080808; border: 1px solid rgba(0, 255, 100, 0.2);
            border-radius: 15px; padding: 15px; margin-bottom: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-on {
            padding: 8px 15px; background: #00ff66; border: none; border-radius: 8px;
            color: #000; font-weight: bold; font-size: 0.7rem;
        }

        @keyframes rgb { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="title">NEXUS VIP 😈</div>

    <div id="login-ui">
        <input type="text" id="keyField" placeholder="ENTER ACCESS KEY">
        <button class="btn-main" onclick="auth()">ENTRAR NO MOD</button>
    </div>

    <div id="menu-ui">
        <div class="hack-card"><span>FLY HEIGHT</span><button class="btn-on" onclick="Android.inject('FLY', '0x5ff59f4', '20 00 80 D2 C0 03 5F D6')">ON</button></div>
        <div class="hack-card"><span>FAST MEDKIT</span><button class="btn-on" onclick="Android.inject('KIT', '0x6a059d0', '20 00 80 D2 C0 03 5F D6')">ON</button></div>
        <div class="hack-card"><span>SCAN ENEMIES</span><button class="btn-on" onclick="Android.inject('SCAN', '0x68f0e70', '20 00 80 D2 C0 03 5F D6')">ON</button></div>
        <div class="hack-card"><span>NO RECOIL</span><button class="btn-on" onclick="Android.inject('RECOIL', '0x6accffc', '20 00 80 D2 C0 03 5F D6')">ON</button></div>
    </div>
</div>

<script>
    async function auth() {
        const key = document.getElementById('keyField').value.trim().toUpperCase();
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB";

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw" 
                },
                body: JSON.stringify({ key, hwid })
            });
            const data = await response.json();

            if (data.status === "valida") {
                // REDIRECIONAMENTO INSTANTÂNEO
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
                if(typeof Android !== 'undefined') Android.onLoginSuccess();
            } else {
                alert("KEY INVÁLIDA!");
            }
        } catch (e) { alert("ERRO DE REDE!"); }
    }

    // MATRIX EFFECT
    const c = document.getElementById('matrix'); const ctx = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const drops = Array(Math.floor(c.width/14)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,c.width,c.height);
        ctx.fillStyle = "#0f6"; ctx.font = "14px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*2), i*14, y*14);
            if(y*14 > c.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 35);
</script>
</body>
</html>
