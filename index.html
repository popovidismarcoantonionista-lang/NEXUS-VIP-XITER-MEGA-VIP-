<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS MEGA MENU</title>
    <style>
        :root { --neon: #00ffff; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { width: 85%; max-width: 330px; padding: 30px; border: 2px solid var(--neon); border-radius: 15px; box-shadow: 0 0 20px var(--neon); text-align: center; background: #000; }
        h2 { text-shadow: 0 0 15px var(--neon); margin: 0 0 10px; letter-spacing: 3px; }
        input { width: 100%; padding: 12px; margin: 15px 0; background: #111; border: 1px solid var(--neon); color: #fff; border-radius: 5px; text-align: center; box-sizing: border-box; outline: none; }
        button { width: 100%; padding: 12px; background: transparent; border: 2px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        button:hover { background: var(--neon); color: #000; box-shadow: 0 0 25px var(--neon); }
        #status { margin-top: 20px; font-size: 11px; font-weight: bold; min-height: 15px; }
        .buy-link { margin-top: 20px; font-size: 10px; opacity: 0.6; text-decoration: none; color: #fff; display: block; }
    </style>
</head>
<body>
    <div class="box">
        <h2>NEXUS MEGA</h2>
        <div style="font-size: 9px; margin-bottom: 15px; opacity: 0.8;">SECURITY SYSTEM V3</div>
        
        <input type="text" id="licenseKey" placeholder="INSIRA SUA CHAVE">
        <button onclick="validar()">ATIVAR MENU</button>
        
        <div id="status">AGUARDANDO...</div>

        <a href="https://nexus-vip-key.vercel.app/" class="buy-link">NÃO TEM UMA KEY? ADQUIRA AQUI</a>
    </div>

    <script>
        async function validar() {
            const key = document.getElementById('licenseKey').value.trim();
            const status = document.getElementById('status');
            
            if(!key) { status.innerText = "ERRO: CHAVE VAZIA!"; return; }

            status.innerText = "CONECTANDO AO SERVIDOR...";
            status.style.color = "#00ffff";

            try {
                // Ponte Java do Sketchware para pegar o ID do aparelho
                const hwid = window.Android ? window.Android.getDeviceId() : "TESTE_BROWSER";
                
                // IMPORTANTE: A verificação continua no Railway (onde está o seu index.js)
                const url = `https://nexus-keys-system.up.railway.app/api/verify?key=${key}&hwid=${hwid}`;

                const response = await fetch(url);
                const data = await response.json();

                if (data.success) {
                    status.innerText = "SUCESSO! LIBERANDO MENU...";
                    status.style.color = "#00ff00";
                    setTimeout(() => { 
                        if(window.Android) window.Android.onLoginSuccess(); 
                    }, 1500);
                } else {
                    status.innerText = "ERRO: " + data.message.toUpperCase();
                    status.style.color = "#ff4444";
                }
            } catch (err) {
                status.innerText = "ERRO DE CONEXÃO COM O SERVIDOR!";
                status.style.color = "yellow";
            }
        }
    </script>
</body>
</html>
