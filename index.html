<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --ciano: #00ffff; --green: #33ff33; }
        body { background: transparent; margin: 0; padding: 10px; font-family: sans-serif; overflow: hidden; }
        #matrix { position: absolute; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }
        .panel { 
            background: rgba(0,0,0,0.95); 
            border: 2px solid var(--ciano); 
            border-radius: 15px; 
            padding: 20px; 
            color: #eee;
            box-shadow: 0 0 20px var(--ciano);
        }
        h1 { color: var(--ciano); text-align: center; font-size: 1.4rem; text-shadow: 0 0 10px var(--ciano); margin: 0 0 15px; }
        h3 { color: var(--green); font-size: 0.8rem; border-bottom: 1px solid rgba(51,255,51,0.3); margin: 15px 0 5px; text-transform: uppercase; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .switch { position: relative; width: 44px; height: 22px; }
        .switch input { display: none; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #444; border-radius: 22px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #aaa; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--ciano); }
        input:checked + .slider:before { transform: translateX(22px); background: #fff; }

        .btn { width: 100%; padding: 15px; background: var(--ciano); border: none; color: #000; font-weight: bold; border-radius: 10px; margin-top: 20px; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="panel">
        <h1>NEXUS MEGA MENU</h1>
        <h3>COMBATE (OFFSETS)</h3>
        <div class="row"><span>AimLock 100%</span><label class="switch"><input type="checkbox" onchange="send('aim', this.checked)"><span class="slider"></span></label></div>
        <div class="row"><span>Aimbot Tiro</span><label class="switch"><input type="checkbox" onchange="send('bot', this.checked)"><span class="slider"></span></label></div>
        <h3>MOVIMENTAÇÃO</h3>
        <div class="row"><span>Velocidade Correr</span><label class="switch"><input type="checkbox" onchange="send('speed', this.checked)"><span class="slider"></span></label></div>
        <button class="btn" onclick="window.Android.openGame('com.dts.freefireth')">INICIAR JOGO</button>
    </div>
    <script>
        function send(f, s) { if(window.Android) window.Android.onFeatureToggle(f, s); }
        const c = document.getElementById('matrix');
        const ctx = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const drops = Array(Math.floor(c.width/15)).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,c.width,c.height);
            ctx.fillStyle = "#0f0";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*15, y*15);
                if(y*15 > c.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    </script>
</body>
</html>
