<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Fundo Preto Sólido para evitar tela branca */
        body { background-color: #0a0a0a; color: #00ff66; font-family: monospace; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .card {
            width: 85%; max-width: 350px; background: #111; border: 2px solid #00ff66;
            border-radius: 20px; padding: 25px; box-shadow: 0 0 15px rgba(0, 255, 100, 0.2);
            text-align: center;
        }

        .title { font-size: 1.5rem; margin-bottom: 20px; text-shadow: 0 0 5px #00ff66; }

        input {
            width: 100%; height: 45px; background: #000; border: 1px solid #00ff66;
            border-radius: 10px; color: #00ff66; text-align: center; margin-bottom: 15px; outline: none;
        }

        .btn {
            width: 100%; height: 50px; background: #00ff66; color: #000; border: none;
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }

        /* Seção do Menu (Inicia Escondida) */
        #menu-ui { display: none; }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; }
        .btn-on { padding: 5px 12px; background: transparent; border: 1px solid #00ff66; color: #00ff66; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-ui">
        <div class="title">NEXUS VIP</div>
        <input type="text" id="keyField" placeholder="INSIRA A KEY">
        <button class="btn" onclick="logar()">ENTRAR</button>
    </div>

    <div id="menu-ui">
        <div class="title">MODS OB53</div>
        <div class="item"><span>FLY HEIGHT</span><button class="btn-on" onclick="Android.inject('FLY', '0x5ff59f4', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button></div>
        <div class="item"><span>NO RECOIL</span><button class="btn-on" onclick="Android.inject('RECOIL', '0x6accffc', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button></div>
        <div class="item"><span>SCAN WALL</span><button class="btn-on" onclick="Android.inject('SCAN', '0x68f0e70', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button></div>
    </div>
</div>

<script>
    async function logar() {
        const key = document.getElementById('keyField').value.trim();
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB";

        if(!key) return alert("DIGITE A KEY!");

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: { "Content-Type": "application/json", "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw" },
                body: JSON.stringify({ key, hwid })
            });
            const data = await response.json();

            if (data.status === "valida") {
                // TROCA DE TELA MANUAL E FORÇADA
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
            } else {
                alert("KEY INVÁLIDA!");
            }
        } catch (e) {
            alert("ERRO DE CONEXÃO!");
        }
    }
</script>
</body>
</html>
