<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP - OB53 FINAL</title>
    <style>
        /* RESET E FONTE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FUNDO MATRIX */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* CONTAINER PRINCIPAL CENTRALIZADO */
        .main-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 340px;
            background: rgba(5, 5, 10, 0.95);
            border: 2px solid #00ff66;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.4);
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .title { 
            color: #00ff66; 
            font-size: 1.8rem; 
            font-weight: bold; 
            text-shadow: 0 0 15px #00ff66; 
            margin-bottom: 5px; 
        }

        .subtitle { 
            color: #555; 
            font-size: 0.7rem; 
            margin-bottom: 25px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        /* LOGIN */
        .input-box { margin-bottom: 20px; }
        .input-box input {
            width: 100%;
            height: 50px;
            background: #000;
            border: 1px solid #00ff66;
            border-radius: 10px;
            padding: 0 15px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
        }

        .btn-main {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00ff66, #00ffff);
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        /* MENU DE FUNÇÕES */
        #menu-ui { display: none; }
        
        .feature-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #00ff66;
        }

        .feature-row span {
            color: #eee;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* SWITCH */
        .switch { position: relative; width: 42px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #333; border-radius: 30px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #00ff66; }
        input:checked + .slider:before { transform: translateX(20px); }

        .footer {
            margin-top: 15px;
            font-size: 0.6rem;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="main-container">
    <!-- TELA DE LOGIN -->
    <div id="login-ui">
        <div class="title">NEXUS VIP</div>
        <div class="subtitle">Secure Auth OB53</div>
        
        <div class="input-box">
            <input type="text" id="accessKey" placeholder="DIGITE SUA KEY" autocomplete="off">
        </div>

        <button class="btn-main" onclick="validarLogin()">ENTRAR NO PAINEL</button>
    </div>

    <!-- MENU DE FUNÇÕES -->
    <div id="menu-ui">
        <div class="title" style="font-size: 1.4rem;">NEXUS PANEL</div>
        <div class="subtitle">64-BIT DUMP ACTIVE</div>

        <div class="feature-row">
            <span>AIMLOCK (AUTO)</span>
            <label class="switch"><input type="checkbox" onchange="togglePatch('AimLock', '0x684ea34', this)"><span class="slider"></span></label>
        </div>

        <div class="feature-row">
            <span>NO RECOIL 100%</span>
            <label class="switch"><input type="checkbox" onchange="togglePatch('NoRecoil', '0x6accffc', this)"><span class="slider"></span></label>
        </div>

        <div class="feature-row">
            <span>SPEED HACK</span>
            <label class="switch"><input type="checkbox" onchange="togglePatch('Speed', '0x72ab058', this)"><span class="slider"></span></label>
        </div>

        <div class="feature-row">
            <span>FAST MEDKIT</span>
            <label class="switch"><input type="checkbox" onchange="togglePatch('Medkit', '0x684ebd4', this)"><span class="slider"></span></label>
        </div>

        <button class="btn-main" style="height: 45px; font-size: 0.8rem; margin-top: 10px;" onclick="abrirJogo()">INICIAR FREE FIRE</button>
    </div>

    <div class="footer">PROTECTED BY NEXUS VIP • v5.0</div>
</div>

<script>
    // --- SISTEMA DE LOGIN REAL ---
    async function validarLogin() {
        const key = document.getElementById('accessKey').value.trim();
        if (!key) {
            alert("⚠️ Digite a Key!");
            return;
        }

        // Avisa o Android (opcional)
        if (typeof Android !== 'undefined') Android.showToast("📡 Verificando Key...");

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "apikey": "COLE_SUA_ANON_KEY_AQUI" 
                },
                body: JSON.stringify({ 
                    key: key, 
                    hwid: (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB_TEST" 
                })
            });

            const data = await response.json();

            if (data.status === "valida") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
                if (typeof Android !== 'undefined') Android.showToast("✅ ACESSO LIBERADO!");
            } else {
                alert("❌ KEY INVÁLIDA!");
            }
        } catch (error) {
            // Plano B: Apenas para teste local caso o Supabase esteja offline
            console.error("Erro Supabase:", error);
            if(key === "TESTE") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
            } else {
                alert("⚠️ Erro de conexão! Verifique sua internet.");
            }
        }
    }

    // --- FUNÇÕES DE INJEÇÃO (OFFSETS DO DUMP) ---
    function togglePatch(nome, offset, el) {
        const status = el.checked ? "ATIVADO" : "DESATIVADO";
        const hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";

        if (typeof Android !== 'undefined') {
            Android.showToast(nome + ": " + status);
            Android.inject(nome, offset, hex);
        } else {
            console.log(`Debug: Injetando ${nome} em ${offset} [${hex}]`);
        }
    }

    function abrirJogo() {
        if (typeof Android !== 'undefined') Android.openGame();
        else alert("Jogo abre apenas no APK!");
    }

    // --- EFEITO MATRIX ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = '01';
    const drops = Array(Math.floor(canvas.width / 20)).fill(1);

    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0f6';
        ctx.font = '15px monospace';
        drops.forEach((y, i) => {
            ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 20, y * 20);
            if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
</script>

</body>
</html>
