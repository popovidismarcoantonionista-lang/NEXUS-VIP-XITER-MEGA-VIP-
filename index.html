<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP V2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; color: #0f6; overflow: hidden; }
        
        #login-screen { width: 85%; max-width: 320px; padding: 30px; background: #0a0a0a; border: 2px solid #0f6; border-radius: 20px; text-align: center; box-shadow: 0 0 20px #0f63; }
        #menu-screen { display: none; width: 90%; max-width: 350px; height: 90vh; background: #0a0a0a; border: 2px solid #0f6; border-radius: 15px; flex-direction: column; padding: 15px; border: 1px solid #0f6; }

        input { width: 100%; padding: 12px; margin: 15px 0; background: #111; border: 1px solid #0f6; border-radius: 8px; color: #fff; text-align: center; outline: none; }
        .btn { width: 100%; padding: 12px; background: #0f6; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 5px; }
        .btn:disabled { background: #333; color: #666; }

        .list { overflow-y: auto; flex-grow: 1; margin: 10px 0; }
        .item { background: #111; padding: 10px; margin-bottom: 8px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; font-size: 13px; }

        .switch { position: relative; width: 38px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #0f6; }
        input:checked + .slider:before { transform: translateX(20px); }

        .btn-launch { background: #ffae00; color: #000; }
        .btn-inject { background: #0088ff; color: #fff; font-size: 11px; }
        
        .list::-webkit-scrollbar { width: 3px; }
        .list::-webkit-scrollbar-thumb { background: #0f6; }
    </style>
</head>
<body>

<div id="login-screen">
    <h2>NEXUS VIP</h2>
    <input type="text" id="keyField" placeholder="INSIRA SUA KEY">
    <button class="btn" id="loginBtn" onclick="auth()">ENTRAR</button>
</div>

<div id="menu-screen">
    <h3 style="text-align:center; border-bottom:1px solid #0f6; padding-bottom:5px; margin-bottom:10px;">MENU NEXUS</h3>
    <button class="btn btn-launch" onclick="launchGame()">🚀 ABRIR FREE FIRE</button>

    <div class="list">
        <div class="item"><span>Aimbot 360</span><label class="switch"><input type="checkbox" onchange="send('aim', this.checked)"><span class="slider"></span></label></div>
        <div class="item"><span>Aura HS</span><label class="switch"><input type="checkbox" onchange="send('hs', this.checked)"><span class="slider"></span></label></div>
        <div class="item"><span>Antena Fina</span><label class="switch"><input type="checkbox" onchange="send('ant', this.checked)"><span class="slider"></span></label></div>
        <div class="item"><span>Speed x10</span><label class="switch"><input type="checkbox" onchange="send('spd', this.checked)"><span class="slider"></span></label></div>
        <div class="item"><span>No Recoil</span><label class="switch"><input type="checkbox" onchange="send('rec', this.checked)"><span class="slider"></span></label></div>
        <div class="item"><span>Medkit Correndo</span><label class="switch"><input type="checkbox" onchange="send('med', this.checked)"><span class="slider"></span></label></div>
        <div class="item"><span>Visão Ipad</span><label class="switch"><input type="checkbox" onchange="send('ipad', this.checked)"><span class="slider"></span></label></div>
        <div class="item"><span>Atravessar Gelo</span><label class="switch"><input type="checkbox" onchange="send('wall', this.checked)"><span class="slider"></span></label></div>
        <button class="btn btn-inject" onclick="inject()">INJETAR VIA SHIZUKU</button>
    </div>
    
    <button class="btn" style="background:#f33; color:#fff;" onclick="exitApp()">SAIR</button>
</div>

<script>
async function auth() {
    const key = document.getElementById('keyField').value.trim().toUpperCase();
    const btn = document.getElementById('loginBtn');
    const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "PC_TESTE";

    if(!key) return alert("Digite a Key!");
    btn.disabled = true; btn.innerText = "CHAVEANDO...";

    try {
        const res = await fetch("https://nexus-vip-key.vercel.app/api/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key, hwid })
        });

        const data = await res.json();

        if (data.status === "valida") {
            // SÓ LIBERA O MENU SE FOR VÁLIDA
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('menu-screen').style.display = 'flex';
            if (typeof Android !== 'undefined') Android.onLoginSuccess();
        } else {
            alert("NEGADO: " + (data.message || "Key Inválida"));
            btn.disabled = false; btn.innerText = "ENTRAR";
        }
    } catch (e) {
        alert("SERVIDOR OFFLINE OU ERRO DE REDE");
        btn.disabled = false; btn.innerText = "ENTRAR";
    }
}

function send(f, s) { if (typeof Android !== 'undefined') Android.setOffset(f, s); }
function inject() { if (typeof Android !== 'undefined') Android.startInjection(); }
function launchGame() { if (typeof Android !== 'undefined') Android.launchGame(); }
function exitApp() { if (typeof Android !== 'undefined') Android.finish(); }
</script>
</body>
</html>
