<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP</title>
    <style>
        /* RESET TOTAL PARA CENTRALIZAÇÃO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        html, body {
            background-color: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* FUNDO MATRIX */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* CONTAINER PRINCIPAL - O SEGREDO DA CENTRALIZAÇÃO */
        .main-container {
            position: relative;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            display: flex; /* Ativa o alinhamento flexível */
            justify-content: center; /* Centraliza horizontalmente */
            align-items: center; /* Centraliza verticalmente */
            padding: 20px;
        }

        /* PAINEL DE LOGIN */
        .login-box {
            width: 100%;
            max-width: 360px; /* Largura ideal para mobile */
            background: rgba(10, 10, 15, 0.95);
            border: 2px solid #00ff66;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.4);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .title { color: #00ff66; font-size: 1.8rem; font-weight: bold; text-shadow: 0 0 10px #00ff66; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 0.7rem; margin-bottom: 25px; letter-spacing: 2px; }

        .input-box { margin-bottom: 15px; }
        .input-box input {
            width: 100%; height: 50px; background: #050505; border: 1px solid #333;
            border-radius: 12px; padding: 0 15px; color: #00ff66; outline: none;
            text-align: center; font-size: 1rem;
        }

        .btn {
            width: 100%; height: 55px; border: none; border-radius: 12px;
            background: linear-gradient(90deg, #00ff66, #00ccff, #ff00ff, #00ff66);
            background-size: 400% 400%; animation: rgb-animation 5s linear infinite;
            color: #000; font-weight: bold; font-size: 1.1rem; cursor: pointer;
            text-transform: uppercase;
        }

        @keyframes rgb-animation { 
            0% { background-position: 0% 50%; } 
            100% { background-position: 400% 50%; } 
        }

        /* MENU DE FUNÇÕES */
        #menu-ui { display: none; }
        .item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 14px;
            border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #00ff66;
        }
        .item span { color: #eee; font-size: 0.9rem; font-weight: bold; }

        /* SWITCH CUSTOM */
        .switch { position: relative; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #222; border-radius: 30px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: #00ff66; }
        input:checked + .slider:before { transform: translateX(21px); }

        .footer { margin-top: 20px; text-align: center; font-size: 0.65rem; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="main-container">
    <div class="login-box">
        
        <div id="login-ui">
            <div class="title">NEXUS VIP 😈</div>
            <div class="subtitle">PREMIUM AUTH SYSTEM</div>
            <div class="input-box"><input type="text" id="user" placeholder="USUÁRIO"></div>
            <div class="input-box"><input type="text" id="key" placeholder="ACCESS KEY"></div>
            <button class="btn" onclick="validar()">ENTRAR</button>
        </div>

        <div id="menu-ui">
            <div class="title" style="font-size: 1.4rem;">NEXUS PANEL</div>
            <div class="subtitle">OB53 DUMP ACTIVE</div>

            <div class="item">
                <span>AIMLOCK</span>
                <label class="switch"><input type="checkbox" onchange="toggle('AimLock', '0x5ff59f4', this)"><span class="slider"></span></label>
            </div>

            <div class="item">
                <span>NO RECOIL</span>
                <label class="switch"><input type="checkbox" onchange="toggle('NoRecoil', '0x6accffc', this)"><span class="slider"></span></label>
            </div>

            <div class="item">
                <span>FAST MEDKIT</span>
                <label class="switch"><input type="checkbox" onchange="toggle('FastMedkit', '0x6a059d0', this)"><span class="slider"></span></label>
            </div>

            <button class="btn" style="height: 48px; margin-top: 10px; font-size: 0.9rem;" onclick="iniciarJogo()">ABRIR FREE FIRE</button>
        </div>

        <div class="footer">PROTECTED BY NEXUS VIP • v5.0</div>
    </div>
</div>

<script>
    // LÓGICA DE LOGIN
    function validar() {
        const keyInput = document.getElementById('key').value;
        if (keyInput.length >= 4) {
            enviarToast("✅ ACESSO LIBERADO!");
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('menu-ui').style.display = 'block';
        } else {
            enviarToast("❌ KEY INVÁLIDA!");
        }
    }

    function iniciarJogo() {
        if (typeof Android !== 'undefined') Android.openGame();
        else alert("Apenas no Aplicativo!");
    }

    function toggle(nome, offset, el) {
        const status = el.checked ? "ON" : "OFF";
        enviarToast(nome + ": " + status);
        if (typeof Android !== 'undefined') {
            const hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
            Android.inject(nome, offset, hex);
        }
    }

    function enviarToast(msg) {
        if (typeof Android !== 'undefined') Android.showToast(msg);
        else console.log(msg);
    }

    // MATRIX EFFECT
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const chars = '01';
    const drops = Array(Math.floor(canvas.width / 20)).fill(1);

    function matrix() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#0f6';
        ctx.font = '15px monospace';
        drops.forEach((y, i) => {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * 20, y * 20);
            if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(matrix, 50);
</script>
</body>
</html>
