<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #080808; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }

        .card {
            width: 90%; max-width: 360px; background: #111; border: 1px solid #00ff66;
            border-radius: 25px; padding: 20px; box-shadow: 0 0 20px #00ff6633;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: #00ff66; font-size: 1.5rem; text-shadow: 0 0 10px #00ff66; }

        /* Estilo do Switch */
        .item {
            display: flex; justify-content: space-between; align-items: center;
            background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 10px;
        }

        .switch {
            position: relative; display: inline-block; width: 45px; height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 24px;
        }

        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }

        input:checked + .slider { background-color: #00ff66; }
        input:checked + .slider:before { transform: translateX(21px); }

        /* Botão Abrir Jogo */
        .btn-open {
            width: 100%; padding: 15px; background: #00ff66; color: #000; border: none;
            border-radius: 15px; font-weight: bold; margin-top: 10px; cursor: pointer;
        }

        #login-ui input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333;
            border-radius: 12px; color: #00ff66; margin-bottom: 15px; text-align: center;
        }

        #menu-ui { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="login-ui">
        <div class="header"><h1>NEXUS LOGIN</h1></div>
        <input type="text" id="key" placeholder="SUA KEY AQUI">
        <button class="btn-open" onclick="entrar()">ENTRAR NO PAINEL</button>
    </div>

    <div id="menu-ui">
        <div class="header"><h1>NEXUS MODS</h1></div>
        
        <div class="item">
            <span>FLY HEIGHT</span>
            <label class="switch">
                <input type="checkbox" onchange="toggle('FLY', '0x5ff59f4', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="item">
            <span>NO RECOIL</span>
            <label class="switch">
                <input type="checkbox" onchange="toggle('RECOIL', '0x6accffc', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="item">
            <span>MEDKIT CORRENDO</span>
            <label class="switch">
                <input type="checkbox" onchange="toggle('KIT', '0x6a059d0', this)">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-open" onclick="Android.openGame()">ABRIR FREE FIRE MAX</button>
    </div>
</div>

<script>
    async function entrar() {
        const key = document.getElementById('key').value.trim();
        // Lógica de validação do Supabase aqui...
        // Simulando sucesso para o exemplo:
        document.getElementById('login-ui').style.display = 'none';
        document.getElementById('menu-ui').style.display = 'block';
    }

    function toggle(nome, offset, element) {
        let hex = element.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6"; // ON / OFF
        if(typeof Android !== 'undefined') {
            Android.inject(nome, offset, hex);
        }
    }
</script>
</body>
</html>
