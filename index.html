<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>

<title>NEXUS PANEL</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:#050505;
    color:white;
}

/* FUNDO RGB */
body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#00ff88;
    filter:blur(180px);
    opacity:.18;
    animation:rgbMove 8s infinite alternate;
}

@keyframes rgbMove{
    0%{
        transform:translate(-200px,-150px);
        background:#00ff88;
    }
    50%{
        transform:translate(200px,100px);
        background:#00aaff;
    }
    100%{
        transform:translate(-100px,200px);
        background:#a855ff;
    }
}

.panel{
    position:relative;
    width:92%;
    max-width:390px;

    background:rgba(15,15,15,.82);
    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:30px;

    padding:22px;

    box-shadow:
    0 0 30px rgba(0,255,136,.10),
    inset 0 0 30px rgba(255,255,255,.03);

    z-index:2;
}

/* TOPO */

.logo{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:25px;
}

.logo-circle{
    width:75px;
    height:75px;
    border-radius:50%;

    background:linear-gradient(135deg,#00ff88,#00aaff);

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:28px;
    font-weight:bold;
    color:#000;

    box-shadow:
    0 0 25px rgba(0,255,136,.4);
}

.logo h1{
    margin-top:12px;
    font-size:1.3rem;
    letter-spacing:2px;
}

.logo p{
    color:#888;
    font-size:.8rem;
    margin-top:4px;
}

/* INPUT */

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    height:55px;

    background:#0d0d0d;

    border:1px solid rgba(255,255,255,.08);

    border-radius:16px;

    padding:0 18px;

    color:#00ff88;

    outline:none;

    transition:.25s;
}

.input-box input:focus{
    border-color:#00ff88;

    box-shadow:
    0 0 15px rgba(0,255,136,.25);
}

/* BOTÃO */

.btn{
    width:100%;
    height:55px;

    border:none;

    border-radius:16px;

    background:linear-gradient(135deg,#00ff88,#00d26f);

    color:#000;

    font-weight:bold;

    cursor:pointer;

    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);

    box-shadow:
    0 10px 25px rgba(0,255,136,.25);
}

/* MENU */

#menu-ui{
    display:none;
}

.section-title{
    color:#00ff88;
    margin-bottom:15px;
    font-size:.95rem;
    letter-spacing:1px;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,.03);

    border:1px solid rgba(255,255,255,.04);

    padding:15px;

    border-radius:18px;

    margin-bottom:12px;

    transition:.25s;
}

.row:hover{
    background:rgba(255,255,255,.05);
}

.row span{
    font-size:.92rem;
    font-weight:600;
}

/* SWITCH */

.switch{
    position:relative;
    width:52px;
    height:28px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;

    background:#262626;

    border-radius:30px;

    cursor:pointer;

    transition:.3s;
}

.slider:before{
    content:"";

    position:absolute;

    width:22px;
    height:22px;

    left:3px;
    top:3px;

    border-radius:50%;

    background:white;

    transition:.3s;
}

.switch input:checked + .slider{
    background:#00ff88;

    box-shadow:
    0 0 12px rgba(0,255,136,.45);
}

.switch input:checked + .slider:before{
    transform:translateX(24px);
}

/* FOOTER */

.footer{
    margin-top:18px;
    text-align:center;
    color:#666;
    font-size:.75rem;
}
</style>
</head>

<body>

<div class="panel">

    <!-- LOGIN -->
    <div id="login-ui">

        <div class="logo">
            <div class="logo-circle">N</div>
            <h1>NEXUS PANEL</h1>
            <p>Premium Gaming Interface</p>
        </div>

        <div class="input-box">
            <input type="text" id="key" placeholder="Digite sua Key">
        </div>

        <button class="btn" onclick="logar()">
            ENTRAR NO PAINEL
        </button>

        <div class="footer">
            Sistema seguro • Interface Premium
        </div>

    </div>

    <!-- MENU -->
    <div id="menu-ui">

        <div class="logo">
            <div class="logo-circle">N</div>
            <h1>NEXUS MENU</h1>
            <p>Painel conectado</p>
        </div>

        <div class="section-title">
            FUNÇÕES
        </div>

        <div class="row">
            <span>AIM ASSIST</span>

            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span>VISUAL BOOST</span>

            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span>FPS BOOST</span>

            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span>ULTRA GRAPHICS</span>

            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn" style="margin-top:10px;">
            ABRIR JOGO
        </button>

    </div>

</div>

<script>

async function logar(){

    const key = document.getElementById('key').value.trim();

    if(key.length < 3){

        alert("Digite uma key válida");
        return;
    }

    const btn = document.querySelector('.btn');

    btn.innerHTML = "CONECTANDO...";
    btn.style.opacity = ".7";

    setTimeout(()=>{

        document.getElementById('login-ui').style.display = "none";
        document.getElementById('menu-ui').style.display = "block";

    },1200);
}

</script>

</body>
</html>
