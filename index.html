<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS VIP</title>
    <style>
        body { background: black; color: #0f0; font-family: monospace; text-align: center; }
        .box { margin-top: 50px; border: 1px solid #0f0; padding: 20px; display: inline-block; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; width: 80%; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; margin-top: 10px; cursor: pointer; font-weight: bold; }
        #msg { margin-top: 15px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>NEXUS VIP</h2>
        <input type="text" id="key" placeholder="DIGITE SUA KEY">
        <button onclick="logar()">LOGIN</button>
        <p id="msg"></p>
    </div>

    <script>
        async function logar() {
            const userKey = document.getElementById('key').value;
            const msg = document.getElementById('msg');
            
            // Pega o HWID do Android através da ponte 'Android'
            let hwid = "BROWSER";
            if (window.Android && window.Android.getDeviceID) {
                hwid = window.Android.getDeviceID();
            }

            msg.innerText = "VERIFICANDO...";

            try {
                // CHAMA A VERCEL (A Vercel cuida do Supabase)
                const response = await fetch(`https://nexus-vip-key.vercel.app/api/verify?key=${userKey}&hwid=${hwid}`);
                const data = await response.json();

                if (data.success) {
                    msg.style.color = "#0f0";
                    msg.innerText = data.message;
                    // Se o login for sucesso, abre o jogo após 1 segundo
                    setTimeout(() => { window.Android.openGame(); }, 1000);
                } else {
                    msg.style.color = "red";
                    msg.innerText = data.message;
                }
            } catch (e) {
                msg.innerText = "ERRO DE CONEXÃO!";
            }
        }
    </script>
</body>
</html>
