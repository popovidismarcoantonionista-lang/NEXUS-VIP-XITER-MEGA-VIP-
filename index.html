<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
        body { height:100vh; display:flex; justify-content:center; align-items:center; overflow:hidden; background:#050505; color:white; }
        
        body::before {
            content:""; position:absolute; width:100%; height:100%; background: radial-gradient(circle at center, rgba(0,255,136,0.1) 0%, transparent 70%);
            z-index:1; pointer-events: none;
        }

        .panel {
            position:relative; width:92%; max-width:390px; background:rgba(20,20,20,0.9);
            backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1);
            border-radius:30px; padding:25px; box-shadow:0 10px 40px rgba(0,0,0,0.5); z-index:2;
        }

        .logo { text-align:center; margin-bottom:25px; }
        .logo-circle {
            width:70px; height:70px; border-radius:50%; background:linear-gradient(135deg,#00ff88,#00aaff);
            margin:0 auto; display:flex; justify-content:center; align-items:center;
            font-size:28px; font-weight:bold; color:#000; box-shadow:0 0 20px rgba(0,255,136,0.3);
        }

        .input-box input {
            width:100%; height:55px; background:#000; border:1px solid #333;
            border-radius:15px; padding:0 18px; color:#00ff88; outline:none; margin-bottom:20px;
        }

        .btn {
            width:100%; height:55px; border:none; border-radius:15px;
            background:linear-gradient(135deg,#00ff88,#00d26f); color:#000;
            font-weight:bold; cursor:pointer; text-transform:uppercase; transition: 0.3s;
        }

        .btn:active { transform: scale(0.98); }

        #menu-ui { display:none; }
        .row {
            display:flex; justify-content:space-between; align-items:center;
            background:rgba(255,255,255,0.05); padding:15px; border-radius:18px; margin-bottom:12px;
        }

        .switch { position:relative; width:50px; height:26px; }
        .switch input { opacity:0; width:0; height:0; }
        .slider { position:absolute; inset:0; background:#333; border-radius:30px; transition:.3s; cursor:pointer; }
        .slider:before { content:""; position:absolute; width:20px; height:20px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.3s; }
        input:checked + .slider { background:#00ff88; }
        input:checked + .slider:before { transform:translateX(24px); }
    </style>
</head>
<body>

<div class="panel">
    <div id="login-ui">
        <div class="logo">
            <div class="logo-circle">N</div>
            <h2 style="margin-top:10px; letter-spacing:2px;">NEXUS VIP</h2>
        </div>
        <div class="input-box"><input type="text" id="key" placeholder="SUA KEY"></div>
        <button class="btn" onclick="logar()">ENTRAR</button>
    </div>

    <div id="menu-ui">
        <h3 style="color:#00ff88; font-size:.9rem; margin-bottom:15px; text-align:center;">OFFSETS OB53</h3>
        
        <div class="row">
            <span>FLY HEIGHT</span>
            <label class="switch">
                <input type="checkbox" onchange="patch('FLY', '0x5ff59f4', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span>NO RECOIL</span>
            <label class="switch">
                <input type="checkbox" onchange="patch('RECOIL', '0x6accffc', this)">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn" style="background:#ffea00; margin-top:10px;" onclick="Android.openGame()">ABRIR JOGO</button>
    </div>
</div>

<script>
async function logar() {
    const key = document.getElementById('key').value.trim();
    if(!key) return;

    const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB";
    
    try {
        const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
            method: "POST",
            headers: { "Content-Type": "application/json", "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw" },
            body: JSON.stringify({ key, hwid })
        });
        const data = await response.json();

        if (data.status === "valida") {
            document.getElementById('login-ui').style.display = 'none';
            document.getElementById('menu-ui').style.display = 'block';
        } else {
            alert("KEY INVÁLIDA!");
        }
    } catch (e) {
        // Se der erro de rede, você pode forçar o login para testes se quiser
        alert("Erro de conexão");
    }
}

function patch(nome, offset, el) {
    const hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
    if(typeof Android !== 'undefined') Android.inject(nome, offset, hex);
}
</script>
</body>
</html>
