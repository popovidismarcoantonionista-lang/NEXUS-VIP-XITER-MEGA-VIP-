<!DOCTYPE html>
<html lang="pt-BR" style="background-color: #080808;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS • OB53</title>
    <style>
        :root {
            --primary: #00ff66;
            --bg: #0a0a0a;
            --card: #111111;
            --text: #ffffff;
            --text-muted: #aaaaaa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(rgba(0, 255, 102, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 102, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .panel {
            width: 92%;
            max-width: 400px;
            background: var(--card);
            border: 1px solid var(--primary);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 0 40px rgba(0, 255, 102, 0.25),
                        inset 0 0 20px rgba(0, 255, 102, 0.08);
            position: relative;
            z-index: 1;
        }

        h1 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #00ff66, #00cc55);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        .input-group {
            position: relative;
            margin-bottom: 18px;
        }

        #key {
            width: 100%;
            padding: 18px 20px;
            background: #0a0a0a;
            border: 2px solid #222;
            border-radius: 16px;
            color: var(--primary);
            font-size: 1rem;
            text-align: center;
            transition: all 0.3s;
        }

        #key:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(0, 255, 102, 0.15);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00ff66, #00cc55);
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
        }

        .btn:active { transform: scale(0.96); }

        .feature {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            padding: 16px 20px;
            border-radius: 18px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            transition: all 0.3s;
        }

        .feature:hover {
            transform: translateX(6px);
            background: #222;
        }

        .switch {
            position: relative;
            width: 52px;
            height: 28px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background: #333;
            transition: .4s;
            border-radius: 50px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        input:checked + .slider {
            background: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .status {
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #00ff66;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="panel">
    <!-- LOGIN -->
    <div id="login-ui">
        <h1>NEXUS</h1>
        <p class="subtitle">AUTH • OB53</p>
        
        <div class="input-group">
            <input type="text" id="key" placeholder="INSIRA SUA KEY" autocomplete="off">
        </div>
        
        <button class="btn" onclick="logar()">ENTRAR NO PAINEL</button>
    </div>

    <!-- MENU -->
    <div id="menu-ui" style="display: none;">
        <h1>NEXUS MODS</h1>
        <p class="subtitle">FREE FIRE MAX • OB53</p>

        <div class="feature">
            <span>FLY HEIGHT</span>
            <label class="switch">
                <input type="checkbox" onchange="patch('FLY', '0x5ff59f4', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="feature">
            <span>NO RECOIL</span>
            <label class="switch">
                <input type="checkbox" onchange="patch('RECOIL', '0x6accffc', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="feature">
            <span>FAST MEDKIT</span>
            <label class="switch">
                <input type="checkbox" onchange="patch('KIT', '0x6a059d0', this)">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn" onclick="openFreeFire()">
            ABRIR FREE FIRE MAX
        </button>

        <div class="status">
            <span>Conectado • Nexus v1.2</span>
        </div>
    </div>
</div>

<script>
    async function logar() {
        const key = document.getElementById('key').value.trim();
        if (!key) return alert("Digite sua key!");

        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB";

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw" 
                },
                body: JSON.stringify({ key, hwid })
            });

            const data = await response.json();

            if (data.status === "valida") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
            } else {
                alert("KEY INVÁLIDA OU EXPIRADA!");
            }
        } catch (e) {
            alert("Erro de conexão com o servidor.");
        }
    }

    function patch(nome, offset, el) {
        const hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
        if (typeof Android !== 'undefined') {
            Android.inject(nome, offset, hex);
        }
    }

    // ==================== ABRIR FREE FIRE ====================
    function openFreeFire() {
        if (typeof Android === 'undefined') {
            alert("Função disponível apenas no Mod Menu (Android)");
            return;
        }

        // Tenta vários métodos para maior compatibilidade
        try {
            // Método 1: Pacote oficial Free Fire Max
            Android.openGame("com.dts.freefiremax");

            // Método 2: Caso o anterior não funcione, tenta com caminho da pasta
            setTimeout(() => {
                Android.launchGame("/storage/emulated/0/Android/data/com.dts.freefiremax");
            }, 800);

        } catch (e) {
            // Fallback simples
            Android.openGame();
        }
    }

    // Suporte à tecla Enter no login
    document.getElementById('key').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') logar();
    });
</script>

</body>
</html>
