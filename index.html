<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --neon: #00ff41; --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .panel { border: 1px solid var(--neon); padding: 20px; border-radius: 10px; box-shadow: 0 0 15px var(--neon); max-width: 300px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #333; color: var(--neon); text-align: center; }
        button { width: 85%; padding: 10px; background: var(--neon); border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .row { display: flex; justify-content: space-between; padding: 15px 5px; border-bottom: 1px solid #222; }
        #menu { display: none; }
    </style>
</head>
<body>

    <div id="login" class="panel">
        <h2 style="color: var(--neon)">NEXUS VIP</h2>
        <input type="text" id="keyInput" placeholder="SUA CHAVE">
        <button onclick="fazerLogin()">ENTRAR NO MENU</button>
    </div>

    <div id="menu" class="panel">
        <h2 style="color: var(--neon)">MENU OB53</h2>
        <div class="row"><span>AIMBOT ASSIST</span><input type="checkbox" onchange="send('aim', this.checked)"></div>
        <div class="row"><span>VELOCIDADE X10</span><input type="checkbox" onchange="send('speed', this.checked)"></div>
        <button onclick="location.reload()" style="background: red; color: white;">SAIR / DESLOGAR</button>
    </div>

    <script>
        // Captura o HWID vindo da URL do Android
        const params = new URLSearchParams(window.location.search);
        const hwid = params.get('hwid') || 'SEM_ID';

        async function fazerLogin() {
            const k = document.getElementById('keyInput').value;
            if(!k) return alert("Digite a Key!");

            try {
                const res = await fetch(`/api/verify?key=${k.trim()}&hwid=${hwid}`);
                const data = await res.json();

                if(data.success) {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('menu').style.display = 'block';
                } else {
                    alert(data.message);
                }
            } catch(e) {
                alert("Erro ao conectar com a Vercel!");
            }
        }

        function send(feature, status) {
            if(window.Android) window.Android.onFeatureToggle(feature, status);
        }
    </script>
</body>
</html>
