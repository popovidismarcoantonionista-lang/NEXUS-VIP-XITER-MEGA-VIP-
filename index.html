<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        /* Variáveis de Cor VIP */
        :root {
            --neon: #00f2ff;
            --matrix: #00ff41;
            --bg: rgba(5, 5, 5, 0.95);
            --card-bg: rgba(25, 25, 25, 0.6);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: transparent;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Fundo Matrix com Blur */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
            filter: blur(1px);
        }

        /* Container Principal com Animação */
        .menu-container {
            width: 92%;
            max-width: 340px;
            background: var(--bg);
            border: 2px solid var(--neon);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2), inset 0 0 15px rgba(0, 242, 255, 0.1);
            animation: fadeIn 0.5s ease-out;
            position: relative;
            backdrop-filter: blur(10px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--neon);
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--neon);
            font-weight: 900;
        }

        .header p {
            color: var(--matrix);
            font-size: 0.65rem;
            margin: 5px 0 0;
            text-transform: uppercase;
            letter-spacing: 4px;
            opacity: 0.8;
        }

        /* Categorias */
        .section-title {
            color: var(--neon);
            font-size: 0.7rem;
            font-weight: 800;
            margin: 18px 0 10px 5px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
        }

        .section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--neon), transparent);
            margin-left: 10px;
            opacity: 0.3;
        }

        /* Itens do Menu */
        .option-card {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .option-card:active {
            transform: scale(0.98);
            background: rgba(0, 242, 255, 0.05);
        }

        .option-card span {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* Switch Pro Customizado */
        .switch {
            position: relative;
            width: 46px;
            height: 24px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 2px;
            background-color: #777;
            transition: .4s;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        input:checked + .slider {
            background-color: rgba(0, 242, 255, 0.2);
            border-color: var(--neon);
        }

        input:checked + .slider:before {
            transform: translateX(20px);
            background-color: var(--neon);
            box-shadow: 0 0 10px var(--neon);
        }

        /* Botão Iniciar VIP */
        .btn-launch {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--neon), #00a2ff);
            border: none;
            color: #000;
            font-weight: 900;
            border-radius: 16px;
            margin-top: 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 242, 255, 0.3);
            transition: 0.3s;
        }

        .btn-launch:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(0, 242, 255, 0.2);
            filter: brightness(1.2);
        }

    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="menu-container">
    <div class="header">
        <h1>NEXUS MEGA</h1>
        <p>Advanced OB53 Dump</p>
    </div>

    <div class="section-title">Combat Logic</div>
    
    <div class="option-card">
        <span>AimLock KnockDown</span>
        <label class="switch">
            <input type="checkbox" onchange="send('aim', this.checked)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="option-card">
        <span>No Recoil & Drop</span>
        <label class="switch">
            <input type="checkbox" onchange="send('recoil', this.checked)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="section-title">Movement & View</div>

    <div class="option-card">
        <span>Speed Skill Sync</span>
        <label class="switch">
            <input type="checkbox" onchange="send('speed', this.checked)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="option-card">
        <span>FOV Zoom Hack</span>
        <label class="switch">
            <input type="checkbox" onchange="send('fov', this.checked)">
            <span class="slider"></span>
        </label>
    </div>

    <button class="btn-launch" onclick="window.Android.openGame()">Iniciar Free Fire</button>
</div>

<script>
    // Comunicação com o Java (Sketchware)
    function send(feature, state) {
        if(window.Android) {
            window.Android.onFeatureToggle(feature, state);
        }
    }

    // Efeito Matrix de Alta Performance
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    resize();

    const characters = "01";
    const fontSize = 12;
    const columns = canvas.width / fontSize;
    const drops = [];

    for (let x = 0; x < columns; x++) {
        drops[x] = 1;
    }

    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#00ff41";
        ctx.font = fontSize + "px monospace";

        for (let i = 0; i < drops.length; i++) {
            const text = characters.charAt(Math.floor(Math.random() * characters.length));
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);

            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                drops[i] = 0;
            }
            drops[i]++;
        }
    }

    setInterval(draw, 50);
</script>

</body>
</html>
