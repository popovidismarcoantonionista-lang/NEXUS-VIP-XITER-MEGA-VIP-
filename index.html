<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP - FINAL OB53</title>
    <style>
        /* RESET TOTAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: #000;
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* MATRIX BACKGROUND */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* PAINEL CENTRAL */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 350px;
            background: rgba(5, 5, 10, 0.98);
            border: 2px solid #00ff66;
            border-radius: 20px;
            padding: 35px 20px;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.4);
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .title { 
            color: #00ff66; 
            font-size: 1.8rem; 
            font-weight: bold; 
            text-shadow: 0 0 15px #00ff66; 
            margin-bottom: 5px; 
        }

        .subtitle { 
            color: #555; 
            font-size: 0.7rem; 
            margin-bottom: 30px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        /* INPUTS */
        .input-group { margin-bottom: 25px; }
        .input-group input {
            width: 100%;
            height: 55px;
            background: #000;
            border: 1px solid #00ff66;
            border-radius: 12px;
            padding: 0 15px;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            box-shadow: inset 0 0 5px rgba(0, 255, 102, 0.2);
        }

        /* BOTÃO */
        .btn-action {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #00ff66, #00ffff);
            color: #000;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-action:active { transform: scale(0.95); }

        /* MENU UI */
        #menu-content { display: none; }
        
        .feature-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 5px solid #00ff66;
        }

        .feature-box span {
            color: #fff;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* SWITCH IOS STYLE */
        .switch { position: relative; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #333; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #00ff66; }
        input:checked + .slider:before { transform: translateX(21px); }

        .footer-info {
            margin-top: 20px;
            font-size: 0.6rem;
            color: #333;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>

<div class="container">
    <!-- TELA DE LOGIN -->
    <div id="login-screen">
        <div class="title">NEXUS VIP</div>
        <div class="subtitle">Secure System OB53</div>
        
        <div class="input-group">
            <input type="text" id="keyInput" placeholder="INSIRA SUA KEY" autocomplete="off">
        </div>

        <button class="btn-action" id="loginBtn" onclick="tentarLogin()">ENTRAR NO PAINEL</button>
    </div>

    <!-- TELA DE MENU -->
    <div id="menu-content">
        <div class="title" style="font-size: 1.4rem;">PAINEL ATIVO</div>
        <div class="subtitle">MOD MENU REAL • 64-BIT</div>

        <div class="feature-box">
            <span>AIMLOCK (AUTO)</span>
            <label class="switch">
                <input type="checkbox" onchange="injetar('AimLock', '0x684ea34', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="feature-box">
            <span>NO RECOIL REAL</span>
            <label class="switch">
                <input type="checkbox" onchange="injetar('NoRecoil', '0x6accffc', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="feature-box">
            <span>SPEED RUNNER</span>
            <label class="switch">
                <input type="checkbox" onchange="injetar('Speed', '0x72ab058', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="feature-box">
            <span>MEDKIT INSTANT</span>
            <label class="switch">
                <input type="checkbox" onchange="injetar('Medkit', '0x684ebd4', this)">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn-action" style="height: 45px; font-size: 0.8rem; margin-top: 10px;" onclick="iniciarFF()">ABRIR FREE FIRE</button>
    </div>

    <div class="footer-info">PROTECTED BY NEXUS • BY MARKOLA</div>
</div>

<script>
    // --- LÓGICA DE LOGIN ---
    async function tentarLogin() {
        const key = document.getElementById('keyInput').value.trim();
        const btn = document.getElementById('loginBtn');

        if (!key) {
            enviarAviso("⚠️ Digite uma Key!");
            return;
        }

        // Alterar estado do botão para evitar múltiplos cliques
        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";
        enviarAviso("📡 A aceder ao servidor...");

        try {
            // Requisição ao Supabase utilizando a sua Secret Key
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": "Bearer Sb_secret_OQ1QZukb0PDVu_xo8yIpgA_EANy-lGV"
                },
                body: JSON.stringify({ 
                    key: key, 
                    hwid: (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB_TEST" 
                })
            });

            const data = await response.json();

            if (data.status === "valida") {
                enviarAviso("✅ ACESSO LIBERADO!");
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('menu-content').style.display = 'block';
            } else {
                alert("❌ KEY INVÁLIDA!");
                resetarBotao();
            }
        } catch (error) {
            console.error(error);
            // Plano B para teste
            if (key === "1010") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('menu-content').style.display = 'block';
            } else {
                alert("⚠️ ERRO DE CONEXÃO: Verifique a internet.");
                resetarBotao();
            }
        }
    }

    function resetarBotao() {
        const btn = document.getElementById('loginBtn');
        btn.disabled = false;
        btn.innerText = "ENTRAR NO PAINEL";
    }

    // --- FUNÇÕES ANDROID ---
    function injetar(nome, offset, el) {
        const hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
        if (typeof Android !== 'undefined') {
            Android.showToast(nome + ": " + (el.checked ? "ON" : "OFF"));
            Android.inject(nome, offset, hex);
        } else {
            console.log(`Injetando ${nome} em ${offset} -> ${hex}`);
        }
    }

    function iniciarFF() {
        if (typeof Android !== 'undefined') Android.openGame();
        else alert("Jogo só abre no APK!");
    }

    function enviarAviso(m) {
        if (typeof Android !== 'undefined') Android.showToast(m);
        else console.log(m);
    }

    // --- MATRIX BG ---
    const c = document.getElementById('matrix-bg');
    const ctx = c.getContext('2d');
    c.width = window.innerWidth;
    c.height = window.innerHeight;
    const letters = Array(Math.floor(c.width / 20)).fill(1);

    function draw() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = '#0f6';
        ctx.font = '15px monospace';
        letters.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random() * 2), i * 20, y * 20);
            if (y * 20 > c.height && Math.random() > 0.975) letters[i] = 0;
            letters[i]++;
        });
    }
    setInterval(draw, 50);
</script>
</body>
</html>
