<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #0f6; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .login-card { background: #111; padding: 30px; border: 1px solid #0f6; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; z-index: 10; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid #0f6; color: #fff; border-radius: 8px; text-align: center; outline: none; }
        button { width: 100%; padding: 12px; background: #0f6; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #063; }
        #status { font-size: 12px; margin-top: 10px; color: #888; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="text-shadow: 0 0 10px #0f6;">NEXUS VIP</h2>
    <input type="text" id="key" placeholder="DIGITE SUA KEY">
    <button id="btn" onclick="validar()">ENTRAR NO MOD</button>
    <div id="status">Aguardando login...</div>
</div>

<script>
    async function validar() {
        const key = document.getElementById('key').value.trim();
        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');

        if (!key) return alert("Digite a key!");

        btn.disabled = true;
        statusDiv.innerText = "Verificando...";

        // Pega o ID real do Android através da ponte que você criou no Java
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB_TEST";

        try {
            // AJUSTE: Aqui você coloca a URL da sua função na Vercel
            const urlVercel = `https://SEU-PROJETO.vercel.app/api/handler?key=${key}&hwid=${hwid}`;
            
            const response = await fetch(urlVercel);
            const data = await response.json();

            if (data.success === true) {
                statusDiv.innerText = "Acesso Liberado!";
                // Chama a função onLoginSuccess do seu código Sketchware
                if (typeof Android !== 'undefined') {
                    Android.onLoginSuccess();
                } else {
                    alert("Sucesso!");
                }
            } else {
                alert("Erro: " + data.message);
                btn.disabled = false;
                statusDiv.innerText = "Falha no acesso.";
            }
        } catch (err) {
            alert("Erro de conexão com a Vercel.");
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
