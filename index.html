<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP - AUTH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: #000; color: #00ff66; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { border: 2px solid #00ff66; padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 340px; background: #050505; box-shadow: 0 0 20px #00ff6644; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid #00ff66; color: #fff; border-radius: 10px; text-align: center; outline: none; }
        button { width: 100%; padding: 12px; background: #00ff66; color: #000; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #004411; color: #666; }
        #status { font-size: 10px; margin-top: 15px; color: #444; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-shadow: 0 0 10px #00ff66;">NEXUS VIP</h2>
    <input type="text" id="keyInput" placeholder="INSIRA SUA KEY">
    <button id="loginBtn" onclick="validar()">LOGAR NO MOD</button>
    <div id="status">AGUARDANDO AUTENTICAÇÃO...</div>
</div>

<script>
    async function validar() {
        const key = document.getElementById('keyInput').value.trim();
        const btn = document.getElementById('loginBtn');
        const status = document.getElementById('status');

        if (!key) return alert("⚠️ Digite a Key!");

        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";

        // Pega o ID do aparelho via Ponte Android do Sketchware
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB_TEST";

        try {
            // URL da sua API na Vercel (Substitua pelo seu link real da Vercel)
            const apiURL = `https://nexus-vip-key.vercel.app/api/handler?key=${key}&hwid=${hwid}`;
            
            const response = await fetch(apiURL);
            const data = await response.json();

            if (data.success === true) {
                status.innerText = "✅ ACESSO LIBERADO!";
                if (typeof Android !== 'undefined') {
                    // Chama o método que você criou no Java
                    Android.onLoginSuccess();
                } else {
                    alert("Sucesso! No APK o FloatingService abriria agora.");
                }
            } else {
                alert("❌ ERRO: " + data.message);
                btn.disabled = false;
                btn.innerText = "LOGAR NO MOD";
            }
        } catch (err) {
            alert("⚠️ FALHA NA CONEXÃO!\nVerifique se o servidor Vercel está ativo.");
            btn.disabled = false;
            btn.innerText = "LOGAR NO MOD";
        }
    }
</script>
</body>
</html>
