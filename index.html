<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP - LOGIN</title>
    <style>
        /* DESIGN DO PAINEL - CENTRALIZADO */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: #000; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            color: #0f6;
            overflow: hidden;
        }

        .container {
            width: 85%;
            max-width: 320px;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #0f6;
            border-radius: 20px;
            padding: 40px 25px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.2);
        }

        h2 { 
            margin-bottom: 25px; 
            letter-spacing: 2px;
            text-shadow: 0 0 10px #0f6;
        }

        input {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #0f6;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            font-size: 16px;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #0f6;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:active { transform: scale(0.98); background: #0c4; }
        .btn:disabled { background: #333; color: #777; }

        .footer-text { margin-top: 15px; font-size: 10px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>NEXUS VIP</h2>
    <input type="text" id="keyInput" placeholder="DIGITE SUA KEY">
    <button class="btn" id="btnEntrar" onclick="autenticar()">Acessar Painel</button>
    <p class="footer-text">Protected by Nexus Xiter VIP</p>
</div>

<script>
async function autenticar() {
    const keyField = document.getElementById('keyInput');
    const btn = document.getElementById('btnEntrar');
    
    const key = keyField.value.trim().toUpperCase();
    const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "Navegador_Teste";

    if (!key) {
        alert("Por favor, insira uma Key!");
        return;
    }

    // Estado de carregamento
    btn.disabled = true;
    btn.innerText = "VERIFICANDO...";

    try {
        const response = await fetch(
            "https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw",
                    "Authorization": "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw"
                },
                body: JSON.stringify({ key: key, hwid: hwid })
            }
        );

        // Resolve o erro de "Unexpected end of JSON input" verificando o texto primeiro
        const responseText = await response.text();
        if (!responseText) throw new Error("O servidor retornou uma resposta vazia.");
        
        const result = JSON.parse(responseText);

        if (result.status === "valida") {
            if (typeof Android !== 'undefined') {
                Android.onLoginSuccess();
            } else {
                alert("SUCESSO! Key válida.");
            }
        } else if (result.status === "expirada") {
            alert("❌ ESTA KEY JÁ EXPIROU!");
        } else {
            alert("❌ KEY INVÁLIDA OU HWID INCORRETO!");
        }

    } catch (e) {
        console.error(e);
        alert("ERRO DE COMUNICAÇÃO: " + e.message);
    } finally {
        btn.disabled = false;
        btn.innerText = "Acessar Painel";
    }
}
</script>

</body>
</html>
