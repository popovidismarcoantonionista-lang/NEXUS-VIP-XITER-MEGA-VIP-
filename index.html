<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS MATRIX MENU</title>
    <style>
        :root {
            --matrix-green: #00ff41;
            --matrix-dark: #003b00;
            --bg-solid: rgba(0, 0, 0, 0.95);
            --border-neon: #00ff41;
        }

        body {
            background: transparent; /* Fundamental para a flutuação */
            margin: 0;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace; /* Fonte estilo terminal */
            user-select: none;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* O Canvas do efeito Matrix */
        #matrix-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Fica atrás de tudo */
            border-radius: 12px;
        }

        /* Container Principal (A Janela) */
        .panel {
            width: 280px;
            background: var(--bg-solid);
            border: 2px solid var(--border-neon);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 0 20px var(--matrix-dark), inset 0 0 10px rgba(0, 255, 65, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Título Estilo Terminal */
        .header h2 {
            color: var(--matrix-green);
            font-size: 1.2rem;
            margin: 0 0 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 8px var(--matrix-green);
        }

        .header h2::before {
            content: "> "; /* Cursor de terminal */
        }

        /* Inputs e Botões */
        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 12px;
            background: #000;
            border: 1px solid var(--matrix-dark);
            color: var(--matrix-green);
            border-radius: 4px;
            text-align: center;
            outline: none;
            font-family: 'Courier New', monospace;
        }

        input:focus {
            border-color: var(--matrix-green);
            box-shadow: 0 0 5px var(--matrix-dark);
        }

        .btn-action {
            width: 100%;
            padding: 10px;
            background: var(--matrix-dark);
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            transition: 0.2s;
        }

        .btn-action:hover {
            background: var(--matrix-green);
            color: #000;
        }

        /* Linhas de Opções (Cheats) */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            border-bottom: 1px solid rgba(0, 255, 65, 0.1);
        }

        .row span {
            color: var(--matrix-green);
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* Switch Customizado Matrix */
        .switch {
            position: relative;
            width: 36px;
            height: 18px;
        }

        .switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            border-radius: 20px;
            transition: .3s;
            border: 1px solid var(--matrix-dark);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 12px;
            width: 12px;
            left: 3px;
            bottom: 2px;
            background: var(--matrix-dark);
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--matrix-green);
        }

        input:checked + .slider:before {
            transform: translateX(18px);
            background: var(--matrix-green);
            box-shadow: 0 0 8px var(--matrix-green);
        }

        /* Telas */
        #menu { display: none; }
    </style>
</head>
<body>

    <div class="panel">
        <canvas id="matrix-canvas"></canvas>

        <div id="login">
            <div class="header"><h2>SYSTEM_LOGIN</h2></div>
            <input type="text" id="keyInput" placeholder="ENTER_KEY_>">
            <button class="btn-action" id="btn" onclick="fazerLogin()">ACCESS</button>
        </div>

        <div id="menu">
            <div class="header"><h2>MATRIX_MODS</h2></div>
            
            <div class="row">
                <span>> AIMBOT.exe</span>
                <label class="switch">
                    <input type="checkbox" onchange="send('aimbot', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="row">
                <span>> HEADSHOT.dat</span>
                <label class="switch">
                    <input type="checkbox" onchange="send('hs', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="row">
                <span>> SPEED.dll</span>
                <label class="switch">
                    <input type="checkbox" onchange="send('speed', this.checked)">
                    <span class="slider"></span>
                </label>
            </div>

            <button onclick="location.reload()" style="background:transparent; border: 1px solid red; color: red; margin-top: 15px; font-size: 9px; width: 100%; font-family: monospace;">TERMINATE_SESSION</button>
        </div>
    </div>

    <script>
        // --- EFEITO MATRIX (Canvas) ---
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        // Define o tamanho do canvas baseado no painel
        canvas.width = 310; // 280 + padding
        canvas.height = 350; // Ajuste conforme a altura do seu menu

        const letters = "01010101010101010101"; // Apenas binário para Matrix clássico
        const fontSize = 10;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            // Fundo preto semi-transparente para criar o efeito de rasto
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Cor do texto Matrix
            ctx.fillStyle = "#0f0"; // Verde Matrix puro
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Reinicia o "pingo" quando chega ao fim ou aleatoriamente
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        // Roda a animação (ajuste o tempo para velocidade)
        setInterval(drawMatrix, 60);


        // --- LÓGICA DO MENU (Existente) ---
        const params = new URLSearchParams(window.location.search);
        const hwid = params.get('hwid') || 'UNKNOWN_DEVICE';

        async function fazerLogin() {
            const k = document.getElementById('keyInput').value.trim();
            if(!k) return;
            const btn = document.getElementById('btn');
            btn.innerText = "VERIFYING...";

            try {
                // CORREÇÃO: Removi a barra inicial '/' para funcionar no GitHub Pages se necessário
                const res = await fetch(`api/verify?key=${k}&hwid=${hwid}`);
                const data = await res.json();
                if(data.success) {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('menu').style.display = 'block';
                    // Redimensiona o canvas se o menu for maior que o login
                    canvas.height = 400; 
                } else {
                    alert("❌ ERROR: " + data.message);
                    btn.innerText = "ACCESS";
                }
            } catch(e) {
                alert("📡 CONNECTION_ERROR");
                btn.innerText = "ACCESS";
            }
        }

        function send(f, s) { 
            if(window.Android && window.Android.onFeatureToggle) {
                window.Android.onFeatureToggle(f, s);
            }
        }
    </script>
</body>
</html>
