<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #matrix { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }
        .container { width: 320px; background: rgba(10, 10, 10, 0.9); border: 2px solid var(--neon); border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 0 20px var(--neon); }
        h2 { color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: var(--neon); border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--neon); border: none; color: black; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .feature-row { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(0,255,65,0.1); }
        #menu { display: none; } /* Começa escondido */
        
        /* Switch Design */
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { display: none; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; border-radius: 20px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--neon); }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div class="container">
        <div id="login">
            <h2>NEXUS LOGIN</h2>
            <input type="text" id="keyInput" placeholder="SUA LICENÇA">
            <button id="loginBtn" onclick="fazerLogin()">AUTENTICAR</button>
        </div>

        <div id="menu">
            <h2>NEXUS MODS</h2>
            <div class="feature-row">
                <span>AIMBOT ASSIST</span>
                <label class="switch"><input type="checkbox" onchange="send('aim', this.checked)"><span class="slider"></span></label>
            </div>
            <div class="feature-row">
                <span>SPEED HACK</span>
                <label class="switch"><input type="checkbox" onchange="send('speed', this.checked)"><span class="slider"></span></label>
            </div>
            <button onclick="location.reload()" style="background:transparent; border:1px solid red; color:red; margin-top:20px;">SAIR</button>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const hwid = params.get('hwid') || 'SEM_ID';

        async function fazerLogin() {
            const k = document.getElementById('keyInput').value;
            const btn = document.getElementById('loginBtn');
            if(!k) return alert("Digite a Key");

            btn.innerText = "VERIFICANDO...";
            try {
                // Chama a sua API na Vercel
                const res = await fetch(`/api/verify?key=${k.trim()}&hwid=${hwid}`);
                const data = await res.json();

                if(data.success) {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('menu').style.display = 'block';
                } else {
                    alert(data.message);
                    btn.innerText = "AUTENTICAR";
                }
            } catch(e) {
                alert("Erro de conexão!");
                btn.innerText = "AUTENTICAR";
            }
        }

        function send(f, s) {
            if(window.Android) window.Android.onFeatureToggle(f, s);
        }

        // Efeito Matrix Simples
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0"; drops.forEach((y, i) => {
                ctx.fillText("01", i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
</html>
