<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS VIP LOGIN</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 2px solid #00ff00; padding: 20px; text-align: center; box-shadow: 0 0 15px #00ff00; width: 80%; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 10px; width: 90%; margin: 15px 0; outline: none; text-align: center; }
        button { background: #00ff00; color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        #status { margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>NEXUS LOGIN</h2>
        <input type="text" id="key" placeholder="COLE SUA KEY">
        <button onclick="logar()">ENTRAR</button>
        <div id="status">Aguardando...</div>
    </div>

    <script>
        async function logar() {
            const key = document.getElementById('key').value;
            const status = document.getElementById('status');
            
            let hwid = "WEB";
            if (window.Android) { hwid = window.Android.getDeviceId(); }

            status.innerText = "VALIDANDO...";

            try {
                // Substitua pela sua URL da Vercel
                const res = await fetch(`https://teu-projeto.vercel.app/api/handler?key=${key}&hwid=${hwid}`);
                const data = await res.json();

                if (data.success) {
                    status.innerText = "SUCESSO! ABRINDO...";
                    // Chama o comando no Sketchware para mudar de tela
                    if (window.Android) { Android.onLoginSuccess(); }
                } else {
                    status.innerText = "ERRO: " + data.message;
                }
            } catch (e) {
                status.innerText = "ERRO DE CONEXÃO";
            }
        }
    </script>
</body>
</html>
