<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS DUMP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #000;
            color: #00ffcc;
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .matrix { 
            position: absolute; inset: 0; overflow: hidden; z-index: 0; 
            background: linear-gradient(transparent, rgba(0, 255, 204, 0.02));
        }
        .matrix span {
            position: absolute; color: #00ffcc; font-size: 13px; 
            opacity: 0.15; animation: fall linear infinite; 
            text-shadow: 0 0 8px #00ffcc;
        }
        @keyframes fall { to { transform: translateY(100vh); } }

        .panel {
            width: 94%; max-width: 430px;
            background: rgba(3, 3, 12, 0.97);
            border: 2px solid #00ffcc;
            border-radius: 20px;
            padding: 24px 20px;
            box-shadow: 0 0 60px rgba(0, 255, 204, 0.65),
                        inset 0 0 25px rgba(0, 255, 204, 0.15);
            position: relative; z-index: 2;
        }

        .header { text-align: center; margin-bottom: 26px; }
        .header h1 { 
            font-size: 2.25rem; letter-spacing: 5px; 
            text-shadow: 0 0 25px #00ffcc; 
        }
        .subtitle { color: #00ff88; font-size: 0.95rem; margin-top: 4px; }

        #key {
            width: 100%; background: rgba(15,15,35,0.9); border: 2px solid #00ffcc;
            border-radius: 14px; padding: 18px; color: #fff; font-size: 1.1rem;
            text-align: center; margin-bottom: 20px; outline: none;
        }
        #key:focus { border-color: #00ff88; box-shadow: 0 0 15px #00ff88; }

        .btn, .btn-start {
            width: 100%; padding: 17px; background: linear-gradient(90deg, #00ffcc, #00ccaa);
            color: #000; font-size: 1.25rem; font-weight: 700; border: none;
            border-radius: 14px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 2px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
            transition: 0.2s;
        }
        .btn:active, .btn-start:active { transform: scale(0.96); }

        .section { margin: 24px 0; }
        .section-title { 
            color: #00ff88; font-size: 0.98rem; margin-bottom: 14px; 
            text-transform: uppercase; letter-spacing: 3px; border-bottom: 1px solid #00ffcc33; padding-bottom: 6px;
        }

        .feature {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 18px; background: rgba(20,20,45,0.85);
            margin-bottom: 10px; border-radius: 12px; border-left: 5px solid #00ffcc;
            transition: 0.3s;
        }
        .feature:hover { background: rgba(30,30,60,0.9); transform: translateX(5px); }

        .switch { position: relative; width: 52px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0; background: #222;
            border-radius: 50px; transition: .4s;
        }
        .slider:before {
            position: absolute; content: ""; height: 22px; width: 22px;
            left: 3px; bottom: 3px; background: #ddd; border-radius: 50%; transition: .4s;
        }
        input:checked + .slider { background: #00ffcc; }
        input:checked + .slider:before { transform: translateX(24px); background: #000; }
    </style>
</head>
<body>

    <div class="matrix" id="matrix"></div>

    <!-- LOGIN -->
    <div class="panel" id="login-ui">
        <div class="header">
            <h1>NEXUS</h1>
            <p class="subtitle">VIP DUMP • OB53</p>
        </div>
        <input type="text" id="key" placeholder="DIGITE SUA KEY" autocomplete="off">
        <button class="btn" onclick="logar()">VALIDAR KEY</button>
    </div>

    <!-- MENU -->
    <div class="panel" id="menu-ui" style="display:none;">
        <div class="header">
            <h1>NEXUS DUMP</h1>
        </div>

        <div class="section">
            <div class="section-title">COMBATE</div>
            <div class="feature"><span>AimLock 100%</span><label class="switch"><input type="checkbox" onchange="patch('AimLock', '0x5ff59f4', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Aimbot Tiro</span><label class="switch"><input type="checkbox" onchange="patch('Aimbot', '0x0000000', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>No Recoil</span><label class="switch"><input type="checkbox" onchange="patch('No Recoil', '0x6accffc', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>No Spread</span><label class="switch"><input type="checkbox" onchange="patch('No Spread', '0x0000000', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Fast Shoot</span><label class="switch"><input type="checkbox" onchange="patch('Fast Shoot', '0x0000000', this)"><span class="slider"></span></label></div>
        </div>

        <div class="section">
            <div class="section-title">MOVIMENTAÇÃO</div>
            <div class="feature"><span>Velocidade Correr</span><label class="switch"><input type="checkbox" onchange="patch('Speed Hack', '0x0000000', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Pulo Alto</span><label class="switch"><input type="checkbox" onchange="patch('High Jump', '0x0000000', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Fly Hacker</span><label class="switch"><input type="checkbox" onchange="patch('Fly', '0x5ff59f4', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Teleport</span><label class="switch"><input type="checkbox" onchange="patch('Teleport', '0x0000000', this)"><span class="slider"></span></label></div>
        </div>

        <div class="section">
            <div class="section-title">VISUAL & MAPA</div>
            <div class="feature"><span>Antena Head</span><label class="switch"><input type="checkbox" onchange="patch('Antena Head', '0x0000000', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Corpo Branco</span><label class="switch"><input type="checkbox" onchange="patch('Corpo Branco', '0x0000000', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Wallhack / ESP</span><label class="switch"><input type="checkbox" onchange="patch('Wallhack', '0x0000000', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Remover Árvores</span><label class="switch"><input type="checkbox" onchange="patch('Remover Árvores', '0x0000000', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Fast Medkit</span><label class="switch"><input type="checkbox" onchange="patch('Fast Medkit', '0x6a059d0', this)"><span class="slider"></span></label></div>
            <div class="feature"><span>Infinite Ammo</span><label class="switch"><input type="checkbox" onchange="patch('Infinite Ammo', '0x0000000', this)"><span class="slider"></span></label></div>
        </div>

        <button class="btn-start" onclick="openFreeFire()">INICIAR FREE FIRE MAX</button>
    </div>

<script>
    // Matrix Rain
    function createMatrixRain() {
        const container = document.getElementById('matrix');
        setInterval(() => {
            const span = document.createElement('span');
            span.textContent = Math.random() > 0.5 ? '1' : '0';
            span.style.left = Math.random() * 100 + 'vw';
            span.style.animationDuration = (Math.random() * 9 + 7) + 's';
            container.appendChild(span);
            setTimeout(() => span.remove(), 18000);
        }, 65);
    }

    async function logar() {
        const key = document.getElementById('key').value.trim();
        if (!key) return alert("Digite sua key!");

        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB";

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw" 
                },
                body: JSON.stringify({ key, hwid })
            });
            const data = await response.json();

            if (data.status === "valida") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
            } else {
                alert("❌ KEY INVÁLIDA OU EXPIRADA!");
            }
        } catch (e) {
            alert("Erro de conexão com o servidor.");
        }
    }

    function patch(nome, offset, el) {
        const hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
        if (typeof Android !== 'undefined') {
            Android.inject(nome, offset, hex);
            console.log(`[NEXUS] ${nome} | ${offset} → ${el.checked ? 'ON' : 'OFF'}`);
        }
    }

    function openFreeFire() {
        if (typeof Android !== 'undefined') {
            Android.openGame("com.dts.freefiremax");
        } else {
            alert("🚀 Free Fire Max iniciado!");
        }
    }

    // Enter key
    document.getElementById('key').addEventListener('keypress', e => {
        if (e.key === 'Enter') logar();
    });

    window.onload = createMatrixRain;
</script>
</body>
</html>
