<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f6; font-family: monospace; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #0f6; padding: 20px; border-radius: 15px; display: inline-block; width: 80%; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #0f6; color: #fff; text-align: center; }
        button { width: 95%; padding: 10px; background: #0f6; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; }
        #menu { display: none; }
    </style>
</head>
<body>

<div class="box" id="login-ui">
    <h2>NEXUS LOGIN</h2>
    <input type="text" id="key" placeholder="DIGITE SUA KEY">
    <button onclick="logar()">ENTRAR</button>
</div>

<div class="box" id="menu" style="display:none;">
    <h2>NEXUS MENU</h2>
    <div style="margin: 10px; padding: 10px; border: 1px solid #333;">
        <span>AIMLOCK</span>
        <button style="width:50px; float:right;" onclick="Android.inject('Aim', '0x684ea34', '20 00 80 D2')">ON</button>
    </div>
    <br>
    <button onclick="Android.openGame()">ABRIR JOGO</button>
</div>

<script>
    async function logar() {
        const key = document.getElementById('key').value;
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB";

        try {
            // Chama a sua API da Vercel
            const res = await fetch(`https://nexus-vip-key.vercel.app/api/handler?key=${key}&hwid=${hwid}`);
            const data = await res.json();

            if (data.success) {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu').style.display = 'block';
            } else {
                alert("Key Inválida!");
            }
        } catch (e) {
            alert("Erro de Conexão com o Servidor!");
        }
    }
</script>
</body>
</html>
