<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>NEXUS IOS PANEL</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:"SF Pro Display",sans-serif; }
    body { height:100vh; display:flex; justify-content:center; align-items:center; overflow:hidden; background:#000; position:relative; }

    /* FUNDO MATRIX */
    #m { position:absolute; inset:0; z-index:0; opacity: 0.4; }

    /* PAINEL COM BORDA RGB GIGANTE */
    .panel {
        position:relative; z-index:5; width:92%; max-width:390px; padding:30px 24px; border-radius:38px;
        background: rgba(15, 15, 20, 0.9); backdrop-filter:blur(30px);
        border: 2px solid transparent;
        background-image: linear-gradient(rgba(15,15,20,0.95), rgba(15,15,20,0.95)), 
                          linear-gradient(135deg, #00ff88, #00c6ff, #8f5cff, #ff00cc, #00ff88);
        background-origin: border-box; background-clip: content-box, border-box;
        background-size: 400% 400%; animation: rgbMove 6s linear infinite;
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    @keyframes rgbMove { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

    /* UI ELEMENTS */
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; }
    .avatar { width:58px; height:58px; border-radius:18px; background: linear-gradient(135deg, #00c6ff, #8f5cff); display:flex; justify-content:center; align-items:center; color:#fff; font-size:1.5rem; font-weight:700; }
    .user h1 { color:#fff; font-size:1.1rem; }
    .user p { color:#bdbdbd; font-size:.82rem; }
    .card { padding:20px; border-radius:28px; background: rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); margin-bottom:15px; }
    .input { width:100%; height:60px; border-radius:20px; background: rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); padding:0 15px; color:#fff; outline:none; }
    .btn { width:100%; height:65px; border:none; border-radius:24px; cursor:pointer; font-size:1rem; font-weight:700; color:#fff; background: linear-gradient(135deg, #00c6ff, #8f5cff); margin-top:10px; }
    
    /* SWITCHES */
    #menu-ui { display: none; }
    .option { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
    .option span { color:#fff; font-size:.95rem; }
    .switch { position:relative; width:50px; height:28px; }
    .switch input { display:none; }
    .slider { position:absolute; inset:0; border-radius:30px; background:#3c3c43; transition:.3s; cursor:pointer; }
    .slider::before { content:""; position:absolute; width:22px; height:22px; border-radius:50%; background:#fff; top:3px; left:3px; transition:.3s; }
    input:checked + .slider { background:#34c759; }
    input:checked + .slider::before { transform:translateX(22px); }

    .status-badge { padding:8px 12px; border-radius:12px; background: rgba(0,255,140,0.1); border:1px solid rgba(0,255,140,0.3); color:#00ff95; font-size:.7rem; font-weight:700; }
</style>
</head>
<body>

<canvas id="m"></canvas>

<div class="panel">
    <div class="top">
        <div style="display:flex; align-items:center; gap:12px;">
            <div class="avatar">N</div>
            <div class="user"><h1>NEXUS IOS</h1><p id="sub-text">Premium System</p></div>
        </div>
        <div class="status-badge">ONLINE</div>
    </div>

    <div id="login-ui">
        <div class="card">
            <input type="text" id="key" class="input" placeholder="Digite sua Key">
            <button class="btn" onclick="logar()">Entrar no Painel</button>
        </div>
    </div>

    <div id="menu-ui">
        <div class="card">
            <div class="option"><span>AIMBOT IOS</span><label class="switch"><input type="checkbox" onchange="patch('AIM','0x123',this)"><span class="slider"></span></label></div>
            <div class="option"><span>FLY HACK</span><label class="switch"><input type="checkbox" onchange="patch('FLY','0x5ff59f4',this)"><span class="slider"></span></label></div>
            <div class="option"><span>NO RECOIL</span><label class="switch"><input type="checkbox" onchange="patch('RECOIL','0x6accffc',this)"><span class="slider"></span></label></div>
        </div>
        <div class="status-badge" style="width:100%; text-align:center; margin-bottom:15px; padding:15px;">ACCESS GRANTED</div>
        <button class="btn" onclick="Android.openGame()">ABRIR JOGO</button>
    </div>

    <div class="footer" style="text-align:center; color:#555; font-size:.7rem;">NEXUS SYSTEM • iOS UI v6.0</div>
</div>

<script>
    // Matrix Background
    const c = document.getElementById('m'); const q = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const s = 16; const d = Array(Math.ceil(c.width/s)).fill(1);
    function draw() {
        q.fillStyle = "rgba(0,0,0,0.05)"; q.fillRect(0,0,c.width,c.height);
        q.fillStyle = "#00ff66"; q.font = s+"px monospace";
        d.forEach((y, i) => {
            q.fillText("01XSUENO"[Math.floor(Math.random()*8)], i*s, y*s);
            if (y*s > c.height && Math.random() > 0.975) d[i] = 0; d[i]++;
        });
    }
    setInterval(draw, 35);

    function logar() {
        const key = document.getElementById('key').value;
        if(key.length > 2) {
            document.getElementById('login-ui').style.display='none';
            document.getElementById('menu-ui').style.display='block';
            document.getElementById('sub-text').innerText = "Access Granted";
        } else { alert("Key Inválida!"); }
    }

    function patch(n, o, el) {
        let hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
        if(typeof Android !== 'undefined') Android.inject(n, o, hex);
    }
</script>
</body>
</html>
