<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TONNY MODS VIP</title>
    <style>
        :root { --neon: #00ff00; --rgb-speed: 4s; }
        body, html { height: 100%; margin: 0; overflow: hidden; background: #000; font-family: sans-serif; display: flex; justify-content: center; align-items: center; }
        #matrix { position: absolute; width: 100%; height: 100%; z-index: -1; opacity: 0.4; }

        .container {
            width: 85%; max-width: 360px; padding: 25px; background: rgba(0, 10, 0, 0.95);
            border-radius: 15px; position: relative; z-index: 1;
            border: 2px solid var(--neon);
            box-shadow: 0 0 20px var(--neon);
            animation: rgbBorder var(--rgb-speed) infinite linear;
        }

        @keyframes rgbBorder {
            0% { border-color: #f00; box-shadow: 0 0 15px #f00; }
            33% { border-color: #0f0; box-shadow: 0 0 15px #0f0; }
            66% { border-color: #00f; box-shadow: 0 0 15px #00f; }
            100% { border-color: #f00; box-shadow: 0 0 15px #f00; }
        }

        .screen { display: none; text-align: center; }
        .active { display: block; }
        h1 { color: #fff; text-shadow: 0 0 10px #fff; font-size: 18px; letter-spacing: 2px; margin-bottom: 20px; }
        
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px; width: 90%; margin-bottom: 15px; text-align: center; outline: none; border-radius: 5px; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        
        .btn-game { background: #00ffff; color: #000; margin-top: 15px; box-shadow: 0 0 10px #00ffff; }

        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 14px; }
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; border-radius: 34px; transition: .4s; border: 1px solid #555; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 2px; background: #fff; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: #004400; border-color: var(--neon); }
        input:checked + .slider:before { transform: translateX(20px); background: var(--neon); }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>

    <div class="container">
        <div id="login-screen" class="screen active">
            <h1>TONNY MODS AUTH</h1>
            <input type="text" id="key" placeholder="DIGITE SUA KEY">
            <button onclick="login()">ENTRAR NO SISTEMA</button>
            <div id="msg" style="color: #f00; font-size: 10px; margin-top: 10px;"></div>
        </div>

        <div id="menu-screen" class="screen">
            <h1>TONNY DUMP MENU</h1>
            <div class="item"><span>AIMLOCK 100%</span><label class="switch"><input type="checkbox" onchange="op('aim', this.checked)"><span class="slider"></span></label></div>
            <div class="item"><span>NO RECOIL</span><label class="switch"><input type="checkbox" onchange="op('recoil', this.checked)"><span class="slider"></span></label></div>
            <div class="item"><span>ESP LINE NEON</span><label class="switch"><input type="checkbox" onchange="op('esp', this.checked)"><span class="slider"></span></label></div>
            <div class="item"><span>SKY DIVE MAX</span><label class="switch"><input type="checkbox" onchange="op('sky', this.checked)"><span class="slider"></span></label></div>
            
            <button class="btn-game" onclick="game()">INICIAR FREE FIRE</button>
        </div>
    </div>

    <script>
        async function login() {
            const k = document.getElementById('key').value;
            const m = document.getElementById('msg');
            let h = window.Android ? Android.getDeviceId() : "WEB";

            try {
                // URL da sua Vercel
                const res = await fetch(`https://nexus-vip-key.vercel.app/api/handler?key=${k}&hwid=${h}`);
                const data = await res.json();
                
                if (data.success) {
                    if (window.Android) Android.showToast("BEM VINDO AO TONNY MODS");
                    document.getElementById('login-screen').classList.remove('active');
                    document.getElementById('menu-screen').classList.add('active');
                } else {
                    m.innerText = "ERRO: " + data.message;
                }
            } catch (e) { m.innerText = "ERRO DE CONEXÃO - VERIFIQUE A VERCEL"; }
        }

        function op(id, st) {
            if (window.Android) {
                Android.aplicar(id, st);
                Android.showToast(id.toUpperCase() + (st ? " ATIVADO" : " DESATIVADO"));
            }
        }
        function game() { if (window.Android) Android.launch(); }

        // Matrix Effect
        const c = document.getElementById('matrix');
        const x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const s = Array(Math.floor(c.width/16)).fill(0);
        function draw() {
            x.fillStyle = "rgba(0,0,0,0.05)"; x.fillRect(0,0,c.width,c.height);
            x.fillStyle = "#0F0"; x.font = "15px monospace";
            s.forEach((y, i) => {
                x.fillText(Math.floor(Math.random()*2), i*16, y);
                if (y > 500 + Math.random()*1000) s[i] = 0; else s[i] += 16;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
</html>
