<body>
    <script>
    async function login() {
        const key = document.getElementById('keyInput').value.trim();
        if (!key) {
            if(typeof Android !== 'undefined') Android.showToast("Digite a Key!");
            return;
        }

        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "PC_TEST";
        
        // MOSTRAR TOAST DE AGUARDE
        if(typeof Android !== 'undefined') Android.showToast("Verificando Key, aguarde...");

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json", 
                    "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." // Sua chave do Supabase
                },
                body: JSON.stringify({ key: key, hwid: hwid })
            });

            const data = await response.json();

            if (data.status === "valida") {
                // SUCESSO
                if(typeof Android !== 'undefined') Android.showToast("✅ ACESSO GARANTIDO!");
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
            } else {
                // FALHA
                if(typeof Android !== 'undefined') Android.showToast("❌ KEY INVÁLIDA OU EXPIRADA!");
            }
        } catch (e) {
            if(typeof Android !== 'undefined') Android.showToast("⚠️ ERRO DE CONEXÃO!");
        }
    }

    function patch(nome, offset, el) {
        const estado = el.checked ? "ATIVADO" : "DESATIVADO";
        const hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
        
        if(typeof Android !== 'undefined') {
            Android.showToast(nome + " " + estado);
            Android.inject(nome, offset, hex);
        }
    }

    /* (Mantenha o seu código do Matrix aqui embaixo) */
</script>
</body>
