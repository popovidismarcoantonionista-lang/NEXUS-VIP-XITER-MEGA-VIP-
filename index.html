<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS EXTERNAL VIP</title>
    <style>
        /* Estilos Base */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: #050505; color: #00ff66; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.6; }

        /* Container Principal (Card Externo) */
        .container {
            width: 90%;
            max-width: 380px;
            background: rgba(13, 13, 13, 0.95);
            border: 2px solid #00ff66;
            border-radius: 24px;
            padding: 30px 22px;
            box-shadow: 0 0 25px rgba(0, 255, 100, 0.4);
            text-align: center;
            z-index: 10;
        }

        .title { font-size: 2rem; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 15px #00ff66; color: #00ff66; }
        .version { font-size: 0.7rem; color: #888; margin-bottom: 25px; letter-spacing: 2px; }

        /* Estilo dos Inputs */
        .input-group { margin-bottom: 18px; }
        .input-group input {
            width: 100%;
            height: 55px;
            background: #080808;
            border: 1px solid #00ff66;
            border-radius: 14px;
            padding: 0 15px;
            color: #00ff66;
            outline: none;
            font-size: 1rem;
            text-align: center;
        }

        /* Botão RGB Animado */
        .btn-main {
            width: 100%;
            height: 55px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            background: linear-gradient(90deg, #00ff66, #00ffff, #ff00ff, #00ff66);
            background-size: 400% 400%;
            animation: rgb-flow 6s linear infinite;
        }

        @keyframes rgb-flow { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

        /* Seção do Menu (Escondida) */
        #menu-ui { display: none; margin-top: 10px; }
        .hack-card {
            background: #080808;
            border: 1px solid rgba(0, 255, 100, 0.2);
            border-radius: 15px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hack-info span { display: block; text-align: left; }
        .hack-name { font-size: 0.9rem; font-weight: bold; }
        .hack-offset { font-size: 0.6rem; color: #555; }
        
        .btn-on {
            padding: 8px 15px;
            background: #00ff66;
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: bold;
            font-size: 0.7rem;
            cursor: pointer;
        }

        .success-msg { color: #00ff66; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="title">NEXUS VIP 😈</div>
    <div class="version">EXTERNAL PANEL v5.0</div>

    <div id="login-ui">
        <div class="input-group">
            <input type="text" id="keyField" placeholder="ENTER ACCESS KEY">
        </div>
        <button class="btn-main" id="loginBtn" onclick="validar()">LOGIN SYSTEM</button>
        <p id="status" style="font-size: 0.7rem; margin-top: 15px; color: #444;">WAITING AUTHENTICATION...</p>
    </div>

    <div id="menu-ui">
        <div class="hack-card">
            <div class="hack-info">
                <span class="hack-name">FLY HEIGHT</span>
                <span class="hack-offset">OFF: 0x5ff59f4</span>
            </div>
            <button class="btn-on" onclick="Android.inject('FLY', '0x5ff59f4', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-card">
            <div class="hack-info">
                <span class="hack-name">FAST MEDKIT</span>
                <span class="hack-offset">OFF: 0x6a059d0</span>
            </div>
            <button class="btn-on" onclick="Android.inject('MEDKIT', '0x6a059d0', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-card">
            <div class="hack-info">
                <span class="hack-name">SCAN WALLHACK</span>
                <span class="hack-offset">OFF: 0x68f0e70</span>
            </div>
            <button class="btn-on" onclick="Android.inject('SCAN', '0x68f0e70', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-card">
            <div class="hack-info">
                <span class="hack-name">NO RECOIL</span>
                <span class="hack-offset">OFF: 0x6accffc</span>
            </div>
            <button class="btn-on" onclick="Android.inject('RECOIL', '0x6accffc', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-card">
            <div class="hack-info">
                <span class="hack-name">ULTRA FPS</span>
                <span class="hack-offset">OFF: 0x7f826c8</span>
            </div>
            <button class="btn-on" onclick="Android.inject('FPS', '0x7f826c8', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>
    </div>
</div>

<script>
    // LÓGICA DE LOGIN E REDIRECIONAMENTO
    async function validar() {
        const key = document.getElementById('keyField').value.trim().toUpperCase();
        const status = document.getElementById('status');
        const loginBtn = document.getElementById('loginBtn');
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB_DEV";

        if(!key) { alert("PREENCHA A KEY!"); return; }

        loginBtn.innerText = "VERIFYING...";
        loginBtn.disabled = true;

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw"
                },
                body: JSON.stringify({ key, hwid })
            });
            const res = await response.json();

            if (res.status === "valida") {
                // Efeito de transição suave para o menu
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
                if(typeof Android !== 'undefined') Android.onLoginSuccess();
            } else {
                alert("KEY INVÁLIDA OU EXPIRADA!");
                loginBtn.innerText = "LOGIN SYSTEM";
                loginBtn.disabled = false;
            }
        } catch (e) {
            alert("ERRO DE CONEXÃO COM O SERVIDOR!");
            loginBtn.innerText = "LOGIN SYSTEM";
            loginBtn.disabled = false;
        }
    }

    // EFEITO MATRIX NO FUNDO
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const letters = "010101";
    const fontSize = 14;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0f6";
        ctx.font = fontSize + "px monospace";
        drops.forEach((y, i) => {
            const text = letters[Math.floor(Math.random() * letters.length)];
            ctx.fillText(text, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 35);
</script>

</body>
</html>
