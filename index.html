<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        :root {
            --neon: #00f2ff;
            --matrix: #00ff41;
            --bg: rgba(5, 5, 5, 0.95);
            --card-bg: rgba(25, 25, 25, 0.6);
            --error: #ff4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        body {
            background: transparent; margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        #canvas { position: absolute; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; filter: blur(1px); }

        /* Containers */
        .container {
            width: 92%; max-width: 340px;
            background: var(--bg);
            border: 2px solid var(--neon);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease-out;
            display: none; /* Escondido por padrão */
        }

        /* Mostrar tela ativa */
        .active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        h1 { color: var(--neon); text-align: center; margin: 0; font-size: 1.6rem; text-shadow: 0 0 15px var(--neon); }
        .subtitle { color: var(--matrix); text-align: center; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 20px; }

        /* Estilo do Input de Key */
        .key-input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--neon);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            outline: none;
        }

        .btn-action {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--neon), #00a2ff);
            border: none; color: #000; font-weight: 900;
            border-radius: 16px; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 8px 20px rgba(0, 242, 255, 0.3);
        }

        .msg { text-align: center; font-size: 0.8rem; margin-top: 10px; height: 20px; }
        .error { color: var(--error); }
        .success { color: var(--matrix); }

        /* Estilos do Menu (Seus estilos originais resumidos) */
        .section-title { color: var(--neon); font-size: 0.7rem; font-weight: 800; margin: 15px 0 10px; text-transform: uppercase; }
        .option-card { background: var(--card-bg); border-radius: 14px; padding: 12px; display: flex; justify-content: space-between; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .option-card span { color: #fff; font-size: 0.9rem; }
        
        /* Switch */
        .switch { position: relative; width: 46px; height: 24px; }
        .switch input { opacity: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #333; border-radius: 34px; transition: .4s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #777; border-radius: 50%; transition: .4s; }
        input:checked + .slider { background: rgba(0, 242, 255, 0.2); border: 1px solid var(--neon); }
        input:checked + .slider:before { transform: translateX(20px); background: var(--neon); box-shadow: 0 0 10px var(--neon); }

    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="login-screen" class="container active">
    <h1>NEXUS LOGIN</h1>
    <p class="subtitle">Insira sua licença</p>
    
    <input type="text" id="key-field" class="key-input" placeholder="DIGITE SUA KEY">
    <button class="btn-action" onclick="verifyKey()">ENTRAR NO MENU</button>
    
    <div id="message" class="msg"></div>
</div>

<div id="menu-screen" class="container">
    <h1>NEXUS MEGA</h1>
    <p class="subtitle">Menu Ativado</p>

    <div class="section-title">Combat Logic</div>
    <div class="option-card">
        <span>AimLock KnockDown</span>
        <label class="switch"><input type="checkbox" onchange="send('aim', this.checked)"><span class="slider"></span></label>
    </div>
    <div class="option-card">
        <span>No Recoil & Drop</span>
        <label class="switch"><input type="checkbox" onchange="send('recoil', this.checked)"><span class="slider"></span></label>
    </div>

    <div class="section-title">Movement & View</div>
    <div class="option-card">
        <span>Speed Skill Sync</span>
        <label class="switch"><input type="checkbox" onchange="send('speed', this.checked)"><span class="slider"></span></label>
    </div>
    <button class="btn-action" style="margin-top: 20px;" onclick="window.Android.openGame()">Iniciar Free Fire</button>
</div>

<script>
    // CONFIGURAÇÃO DA VERCEL
    const API_URL = "https://sua-api-vercel.vercel.app/api/verify"; // Coloque sua URL aqui

    async function verifyKey() {
        const key = document.getElementById('key-field').value;
        const msg = document.getElementById('message');

        if(!key) {
            msg.innerHTML = '<span class="error">Digite uma Key!</span>';
            return;
        }

        msg.innerHTML = "Verificando...";

        try {
            // Chamada para sua API na Vercel
            const response = await fetch(`${API_URL}?key=${key}`);
            const data = await response.json();

            if(data.status === "success") {
                msg.innerHTML = '<span class="success">Key Válida! Acessando...</span>';
                setTimeout(() => {
                    document.getElementById('login-screen').classList.remove('active');
                    document.getElementById('menu-screen').classList.add('active');
                }, 1000);
            } else {
                msg.innerHTML = '<span class="error">Key Inválida ou Expirada!</span>';
            }
        } catch (e) {
            // Apenas para teste local (remover quando sua API estiver pronta)
            if(key === "NEXUS-FREE") { 
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('menu-screen').classList.add('active');
            } else {
                msg.innerHTML = '<span class="error">Erro de Conexão com Servidor!</span>';
            }
        }
    }

    function send(f, s) { if(window.Android) window.Android.onFeatureToggle(f, s); }

    // Efeito Matrix
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const columns = canvas.width / 12;
    const drops = new Array(Math.floor(columns)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.08)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#00ff41"; ctx.font = "12px monospace";
        drops.forEach((y, i) => {
            ctx.fillText(Math.floor(Math.random()*2), i * 12, y * 12);
            if (y * 12 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
</script>

</body>
</html>
