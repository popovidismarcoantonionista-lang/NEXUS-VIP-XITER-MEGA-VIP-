<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: #050505; color: #00ff66; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.5; }

        .container {
            width: 90%; max-width: 380px; background: rgba(10, 10, 10, 0.95);
            border: 2px solid #00ff66; border-radius: 20px; padding: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.3); text-align: center; z-index: 10;
        }

        .title { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #00ff66; }

        input {
            width: 100%; height: 50px; background: #000; border: 1px solid #00ff66;
            border-radius: 12px; padding: 0 15px; color: #00ff66; outline: none; margin-bottom: 20px; text-align: center;
        }

        .btn-main {
            width: 100%; height: 55px; border: none; border-radius: 12px; font-weight: bold;
            background: linear-gradient(90deg, #00ff66, #00ffff, #00ff66);
            background-size: 400%; animation: rgb 6s linear infinite; color: #000; cursor: pointer;
        }

        @keyframes rgb { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

        /* MENU SECTION */
        #menu-ui { display: none; margin-top: 10px; }
        .hack-card {
            background: #080808; border: 1px solid rgba(0, 255, 100, 0.2);
            border-radius: 12px; padding: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-on { padding: 8px 15px; background: #00ff66; border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="title">NEXUS VIP 😈</div>

    <div id="login-ui">
        <input type="text" id="keyField" placeholder="DIGITE SUA KEY">
        <button class="btn-main" onclick="autenticar()">LOGIN SHIZUKU</button>
    </div>

    <div id="menu-ui">
        <div class="hack-card"><span>FLY HEIGHT</span><button class="btn-on" onclick="Android.inject('FLY', '0x5ff59f4', '20 00 80 D2 C0 03 5F D6')">ON</button></div>
        <div class="hack-card"><span>NO RECOIL</span><button class="btn-on" onclick="Android.inject('RECOIL', '0x6accffc', '20 00 80 D2 C0 03 5F D6')">ON</button></div>
        <div class="hack-card"><span>SCAN WALL</span><button class="btn-on" onclick="Android.inject('SCAN', '0x68f0e70', '20 00 80 D2 C0 03 5F D6')">ON</button></div>
    </div>
</div>

<script>
    async function autenticar() {
        const key = document.getElementById('keyField').value.trim();
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB";

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: { "Content-Type": "application/json", "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw" },
                body: JSON.stringify({ key, hwid })
            });
            const data = await response.json();

            if (data.status === "valida") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
                if(typeof Android !== 'undefined') Android.onLoginSuccess();
            } else { alert("KEY INVÁLIDA!"); }
        } catch (e) { alert("ERRO DE REDE!"); }
    }

    // MATRIX EFFECT
    const c = document.getElementById('matrix'); const q = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const drops = Array(Math.floor(c.width/14)).fill(1);
    function draw() {
        q.fillStyle = 'rgba(0,0,0,0.1)'; q.fillRect(0,0,c.width,c.height);
        q.fillStyle = '#0f6'; q.font = '14px monospace';
        drops.forEach((y, i) => {
            q.fillText(Math.floor(Math.random()*2), i*14, y*14);
            if(y*14 > c.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 35);
</script>
</body>
</html>
