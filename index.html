<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', monospace; }
        body { background: #050505; color: #00ff66; overflow: hidden; height: 100vh; display: flex; justify-content: center; align-items: center; }
        canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.5; }

        .container {
            width: 90%; max-width: 380px; background: rgba(10, 10, 10, 0.95);
            border: 2px solid #00ff66; border-radius: 20px; padding: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 100, 0.3); text-align: center; z-index: 10;
        }

        .title { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; text-shadow: 0 0 10px #00ff66; }

        /* Estilo Login */
        .input-box input {
            width: 100%; height: 50px; background: #000; border: 1px solid #00ff66;
            border-radius: 10px; padding: 0 15px; color: #00ff66; outline: none; margin-bottom: 20px; text-align: center;
        }

        .btn-main {
            width: 100%; height: 55px; border: none; border-radius: 12px; font-weight: bold;
            background: linear-gradient(90deg, #00ff66, #00ffff, #ff00ff, #00ff66);
            background-size: 400%; animation: rgb 6s linear infinite; color: #000; cursor: pointer;
        }

        @keyframes rgb { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

        /* SEÇÃO DO MENU - ESCONDIDA INICIALMENTE */
        #menuSection { display: none; margin-top: 10px; max-height: 450px; overflow-y: auto; }
        
        .hack-card {
            background: #080808; border: 1px solid rgba(0, 255, 100, 0.2);
            border-radius: 12px; padding: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .btn-inject {
            padding: 8px 15px; background: #00ff66; border: none; border-radius: 6px;
            color: #000; font-weight: bold; font-size: 0.7rem; cursor: pointer;
        }

        .loading { color: #888; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="title">NEXUS VIP 😈</div>

    <div id="loginSection">
        <div class="input-box">
            <input type="text" id="keyInput" placeholder="INSIRA SUA KEY">
        </div>
        <button class="btn-main" id="btnLog" onclick="processarLogin()">ENTRAR NO PAINEL</button>
        <p id="msg" class="loading">AGUARDANDO AUTENTICAÇÃO...</p>
    </div>

    <div id="menuSection">
        <p style="font-size: 0.7rem; color: #555; margin-bottom: 15px;">DUMP OB53 MAX DETECTADO</p>
        
        <div class="hack-card">
            <span>FLY HEIGHT</span>
            <button class="btn-inject" onclick="Android.inject('FLY', '0x5ff59f4', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-card">
            <span>FAST MEDKIT</span>
            <button class="btn-inject" onclick="Android.inject('MEDKIT', '0x6a059d0', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-card">
            <span>SCAN ENEMY</span>
            <button class="btn-inject" onclick="Android.inject('SCAN', '0x68f0e70', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-card">
            <span>NO RECOIL</span>
            <button class="btn-inject" onclick="Android.inject('RECOIL', '0x6accffc', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-card">
            <span>60 FPS MAX</span>
            <button class="btn-inject" onclick="Android.inject('FPS', '0x7f826c8', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>
    </div>
</div>

<script>
    async function processarLogin() {
        const key = document.getElementById('keyInput').value.trim().toUpperCase();
        const btn = document.getElementById('btnLog');
        const msg = document.getElementById('msg');
        
        // Pega o ID do dispositivo via Java
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB_TEST";

        if(!key) return alert("DIGITE UMA KEY!");

        btn.innerText = "VERIFICANDO...";
        btn.disabled = true;

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw"
                },
                body: JSON.stringify({ key: key, hwid: hwid })
            });

            const data = await response.json();

            if (data.status === "valida") {
                // REDIRECIONAMENTO INTERNO (Troca de Divs)
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('menuSection').style.display = 'block';
                
                // Avisa o Java que o login foi OK
                if(typeof Android !== 'undefined') Android.onLoginSuccess();
            } else {
                alert("KEY INVÁLIDA!");
                btn.innerText = "ENTRAR NO PAINEL";
                btn.disabled = false;
            }
        } catch (error) {
            alert("ERRO DE REDE: " + error);
            btn.innerText = "ENTRAR NO PAINEL";
            btn.disabled = false;
        }
    }

    // EFEITO MATRIX
    const c = document.getElementById('matrix'); const q = c.getContext('2d');
    c.width = window.innerWidth; c.height = window.innerHeight;
    const drops = Array(Math.floor(c.width/14)).fill(1);
    function draw() {
        q.fillStyle = 'rgba(0,0,0,0.1)'; q.fillRect(0,0,c.width,c.height);
        q.fillStyle = '#0f6'; q.font = '14px monospace';
        drops.forEach((y, i) => {
            q.fillText(Math.floor(Math.random()*2), i*14, y*14);
            if(y*14 > c.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 35);
</script>
</body>
</html>
