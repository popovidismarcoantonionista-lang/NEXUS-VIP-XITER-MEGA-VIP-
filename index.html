<!DOCTYPE html>
<html lang="pt-br" style="background-color: #000;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Consolas, monospace; }
    body { height:100vh; overflow:hidden; display:flex; justify-content:center; align-items:center; background:#000; color:#00ff66; }

    /* MATRIX FUNDO */
    .matrix { position:absolute; inset:0; overflow:hidden; z-index:0; }
    .matrix span { position:absolute; top:-100%; color:#00ff66; opacity:.15; font-size:22px; animation:fall linear infinite; }
    @keyframes fall { 100% { transform:translateY(220vh); } }

    /* BORDA RGB PREMIUM */
    .rgb-border {
        position: relative; padding: 3px; border-radius: 38px; z-index: 2;
        background: linear-gradient(135deg, #ff0000, #00ff00, #0000ff, #ff0000);
        background-size: 300% 300%; animation: move-rgb 4s linear infinite;
        box-shadow: 0 0 20px rgba(0, 255, 102, 0.3);
    }
    @keyframes move-rgb { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    .panel {
        position:relative; width:100%; max-width:390px; padding:35px 28px;
        border-radius:35px; background:rgba(0,0,0,.95); backdrop-filter:blur(10px);
    }

    .title h1 { font-size:1.8rem; text-align:center; color:#00ff66; text-shadow:0 0 15px #00ff66; margin-bottom:5px; }
    .subtitle { text-align:center; color:#555; margin-bottom:30px; font-size:.8rem; letter-spacing:2px; }

    .input-box input {
        width:100%; height:65px; border-radius:18px; border:2px solid #00ff66;
        background:#050505; color:#00ff66; font-size:1rem; padding:0 20px; outline:none;
        box-shadow: inset 0 0 10px rgba(0,255,100,0.1); margin-bottom:20px;
    }

    .btn {
        width:100%; height:70px; border:none; border-radius:18px; cursor:pointer;
        font-size:1.1rem; font-weight:bold; color:#000;
        background: linear-gradient(90deg, #bb33ff, #ff00c8); transition:.2s;
    }

    /* MENU UI */
    #menu-ui { display: none; }
    .row { 
        display:flex; justify-content:space-between; align-items:center; 
        background:rgba(0,255,100,0.05); padding:15px; border-radius:15px; margin-bottom:10px;
        border: 1px solid rgba(0,255,100,0.1);
    }

    /* SWITCH */
    .switch { position:relative; width:45px; height:24px; }
    .switch input { opacity:0; width:0; height:0; }
    .slider { position:absolute; inset:0; background:#222; border-radius:30px; cursor:pointer; transition:.3s; }
    .slider:before { content:""; position:absolute; height:18px; width:18px; left:3px; bottom:3px; background:white; transition:.3s; border-radius:50%; }
    input:checked + .slider { background:#00ff66; }
    input:checked + .slider:before { transform:translateX(21px); }
</style>
</head>
<body>

<div class="matrix" id="matrix"></div>

<div class="rgb-border">
    <div class="panel">
        <div id="login-ui">
            <div class="title"><h1>NEXUS VIP 😈</h1></div>
            <div class="subtitle">SECURE LOGIN SYSTEM</div>
            <div class="input-box"><input type="text" id="key" placeholder="DIGITE SUA KEY"></div>
            <button class="btn" id="btn-login" onclick="logar()">ACCESS GRANTED</button>
        </div>

        <div id="menu-ui">
            <div class="title"><h1>NEXUS MODS</h1></div>
            <div class="subtitle">OB53 ACTIVE</div>
            
            <div class="row">
                <span>FLY HEIGHT</span>
                <label class="switch">
                    <input type="checkbox" onchange="patch('FLY', '0x5ff59f4', this)">
                    <span class="slider"></span>
                </label>
            </div>
            
            <div class="row">
                <span>NO RECOIL</span>
                <label class="switch">
                    <input type="checkbox" onchange="patch('RECOIL', '0x6accffc', this)">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn" style="background:#ffea00; margin-top:15px;" onclick="Android.openGame()">ABRIR FREE FIRE</button>
        </div>
    </div>
</div>

<script>
    // Efeito Matrix
    const matrix = document.getElementById("matrix");
    const chars = "01XSUENO";
    for(let i = 0; i < 80; i++){
        const span = document.createElement("span");
        span.innerText = chars[Math.floor(Math.random()*chars.length)];
        span.style.left = Math.random()*100 + "vw";
        span.style.animationDuration = (Math.random()*5+3) + "s";
        matrix.appendChild(span);
    }

    async function logar() {
        const key = document.getElementById('key').value.trim();
        if(!key) return;

        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB_DEV";
        const btn = document.getElementById('btn-login');
        btn.innerHTML = "VERIFICANDO...";

        try {
            const response = await fetch("https://qudbsaujvnvwoybxarhp.supabase.co/functions/v1/validate-key", {
                method: "POST",
                headers: { "Content-Type": "application/json", "apikey": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1ZGJzYXVqdm52d295YnhhcmhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3ODY4NzIsImV4cCI6MjA5MzM2Mjg3Mn0.6TpmoQCaLNiSkW8wUj4s1-OATJp2qX9zii9escmKqYw" },
                body: JSON.stringify({ key, hwid })
            });
            const data = await response.json();

            if (data.status === "valida") {
                document.getElementById('login-ui').style.display = 'none';
                document.getElementById('menu-ui').style.display = 'block';
            } else {
                alert("KEY OU HWID INVÁLIDOS");
                btn.innerHTML = "ACCESS GRANTED";
            }
        } catch (e) { alert("ERRO DE CONEXÃO"); btn.innerHTML = "ACCESS GRANTED"; }
    }

    function patch(nome, offset, el) {
        const hex = el.checked ? "20 00 80 D2 C0 03 5F D6" : "00 00 80 D2 C0 03 5F D6";
        if(typeof Android !== 'undefined') Android.inject(nome, offset, hex);
    }
</script>
</body>
</html>
