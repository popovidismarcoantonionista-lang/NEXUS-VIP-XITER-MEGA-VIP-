<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #000; color: #0f6; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .login-card { background: #111; padding: 30px; border: 1px solid #0f6; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border-bottom: 4px solid #0f6; }
        input { width: 100%; padding: 12px; margin: 20px 0; background: #000; border: 1px solid #0f6; color: #fff; border-radius: 8px; text-align: center; outline: none; }
        button { width: 100%; padding: 12px; background: #0f6; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #063; color: #888; }
        #status { font-size: 11px; margin-top: 15px; color: #555; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="letter-spacing: 2px;">NEXUS VIP</h2>
    <input type="text" id="key" placeholder="INSIRA SUA KEY VIP">
    <button id="btn" onclick="validar()">ENTRAR NO PAINEL</button>
    <div id="status">SISTEMA ONLINE</div>
</div>

<script>
    async function validar() {
        const key = document.getElementById('key').value.trim();
        const btn = document.getElementById('btn');
        const statusDiv = document.getElementById('status');

        if (!key) {
            alert("⚠️ Digite uma Key!");
            return;
        }

        // Bloqueia o botão para não bugar
        btn.disabled = true;
        btn.innerText = "VERIFICANDO...";
        statusDiv.innerText = "Conectando à Vercel...";

        // Pega o ID do aparelho (HWID) do Android
        const hwid = (typeof Android !== 'undefined') ? Android.getDeviceId() : "WEB_DEBUG";

        try {
            // URL da sua API na Vercel (AJUSTE O LINK ABAIXO)
            const urlVercel = `https://SEU-PROJETO.vercel.app/api/handler?key=${key}&hwid=${hwid}`;
            
            // Faz a chamada para a Vercel
            const response = await fetch(urlVercel);
            
            if (!response.ok) throw new Error("Erro no servidor Vercel");

            const data = await response.json();

            // Se a Vercel responder success: true
            if (data.success === true) {
                statusDiv.innerText = "✅ Acesso Liberado!";
                if (typeof Android !== 'undefined') {
                    Android.onLoginSuccess(); // Chama o Java do Sketchware
                } else {
                    alert("Acesso Liberado (Teste Web)");
                }
            } else {
                alert("❌ " + data.message);
                resetar();
            }
        } catch (err) {
            alert("⚠️ Falha na conexão!");
            resetar();
        }

        function resetar() {
            btn.disabled = false;
            btn.innerText = "ENTRAR NO PAINEL";
            statusDiv.innerText = "Aguardando nova tentativa...";
        }
    }
</script>
</body>
</html>
