<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --neon: #00ff41;
            --neon-bg: rgba(0, 255, 65, 0.1);
            --bg: rgba(5, 5, 5, 0.92);
            --border-color: rgba(0, 255, 65, 0.3);
        }

        body {
            background: transparent;
            margin: 0;
            padding: 10px;
            font-family: 'Segoe UI', sans-serif;
            user-select: none;
        }

        /* Container com Glassmorphism */
        .panel {
            background: var(--bg);
            border: 1.5px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 10px rgba(0, 255, 65, 0.1);
            text-align: center;
            backdrop-filter: blur(8px);
        }

        /* Cabeçalho */
        .header {
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .header h2 {
            color: var(--neon);
            font-size: 1.1rem;
            margin: 0;
            text-shadow: 0 0 8px var(--neon);
            letter-spacing: 2px;
        }

        /* Inputs e Botões */
        input {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #222;
            color: var(--neon);
            border-radius: 6px;
            text-align: center;
            outline: none;
        }

        .btn-action {
            width: 100%;
            padding: 10px;
            background: var(--neon);
            border: none;
            color: #000;
            font-weight: 900;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-action:active { transform: scale(0.96); }

        /* Estilo das Opções (Switches) */
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 5px;
            border-radius: 6px;
        }

        .row span {
            color: #ccc;
            font-size: 0.75rem;
            font-weight: bold;
        }

        /* Switch Customizado Moderno */
        .switch {
            position: relative;
            width: 38px;
            height: 20px;
        }

        .switch input { display: none; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #1a1a1a;
            border-radius: 20px;
            transition: .3s;
            border: 1px solid #333;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background: #444;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: var(--neon-bg);
            border-color: var(--neon);
        }

        input:checked + .slider:before {
            transform: translateX(18px);
            background: var(--neon);
            box-shadow: 0 0 8px var(--neon);
        }

        /* Botões de Abertura do Jogo */
        .game-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn-game {
            flex: 1;
            padding: 8px;
            font-size: 10px;
            border-radius: 4px;
            border: none;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        /* Telas */
        #menu { display: none; }
    </style>
</head>
<body>

    <div class="panel" id="login">
        <div class="header"><h2>NEXUS LOGIN</h2></div>
        <input type="text" id="keyInput" placeholder="LICENSE KEY">
        <button class="btn-action" id="btn" onclick="fazerLogin()">LOGIN</button>
    </div>

    <div class="panel" id="menu">
        <div class="header"><h2>NEXUS VIP</h2></div>
        
        <div class="game-group">
            <button class="btn-game" style="background: linear-gradient(to right, #ff4b1f, #ff9068);" onclick="window.Android.openGame('com.dts.freefireth')">FF NORMAL</button>
            <button class="btn-game" style="background: linear-gradient(to right, #834d9b, #d04ed6);" onclick="window.Android.openGame('com.dts.freefiremax')">FF MAX</button>
        </div>

        <div class="row">
            <span>AIMBOT ASSIST</span>
            <label class="switch">
                <input type="checkbox" onchange="send('aimbot', this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span>HEADSHOT 100%</span>
            <label class="switch">
                <input type="checkbox" onchange="send('hs', this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="row">
            <span>SPEED X10</span>
            <label class="switch">
                <input type="checkbox" onchange="send('speed', this.checked)">
                <span class="slider"></span>
            </label>
        </div>

        <button onclick="location.reload()" style="background:transparent; border: 1px solid rgba(255,0,0,0.5); color: #ff5555; margin-top: 10px; font-size: 10px; width: 100%; border-radius: 4px; padding: 5px;">DESCONECTAR</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const hwid = params.get('hwid') || 'UNKNOWN';

        async function fazerLogin() {
            const k = document.getElementById('keyInput').value.trim();
            if(!k) return;
            const btn = document.getElementById('btn');
            btn.innerText = "CHECKING...";

            try {
                const res = await fetch(`/api/verify?key=${k}&hwid=${hwid}`);
                const data = await res.json();
                if(data.success) {
                    document.getElementById('login').style.display = 'none';
                    document.getElementById('menu').style.display = 'block';
                } else {
                    alert(data.message);
                    btn.innerText = "LOGIN";
                }
            } catch(e) {
                alert("CONECTION ERROR");
                btn.innerText = "LOGIN";
            }
        }

        function send(f, s) { 
            if(window.Android && window.Android.onFeatureToggle) {
                window.Android.onFeatureToggle(f, s);
            }
        }
    </script>
</body>
</html>
