<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXUS XITER</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:'Share Tech Mono', monospace;
    position:relative;
}

/* MATRIX BACKGROUND */

.matrix{
    position:absolute;
    inset:0;
    overflow:hidden;
    z-index:0;
}

.column{
    position:absolute;
    top:-100%;
    color:#00ff66;
    font-size:22px;
    line-height:22px;
    white-space:pre;
    opacity:.16;
    animation:fall linear infinite;
    text-shadow:0 0 8px #00ff66;
}

@keyframes fall{
    to{
        transform:translateY(220vh);
    }
}

/* MAIN PANEL */

.panel{
    position:relative;
    z-index:2;

    width:92%;
    max-width:390px;

    border-radius:38px;

    padding:38px 28px;

    background:rgba(0,0,0,.94);

    border:3px solid #00ff66;

    box-shadow:
    0 0 15px #00ff66,
    0 0 35px rgba(255,255,0,.45),
    0 0 90px rgba(0,255,100,.25);

    overflow:hidden;
}

/* GLOW */

.panel::before{
    content:"";
    position:absolute;
    inset:-2px;

    border-radius:40px;

    background:linear-gradient(
        130deg,
        rgba(255,255,0,.15),
        transparent,
        rgba(0,255,100,.12)
    );

    pointer-events:none;
}

/* TITLE */

.title{
    text-align:center;
    margin-bottom:10px;
}

.title h1{
    color:#00ff66;
    font-size:3rem;
    letter-spacing:3px;

    text-shadow:
    0 0 8px #00ff66,
    0 0 18px #00ff66,
    0 0 35px #00ff66;
}

.title span{
    margin-left:10px;
    filter:drop-shadow(0 0 12px #ff00ff);
}

.subtitle{
    text-align:center;
    color:#6b6b6b;
    font-size:1rem;
    letter-spacing:3px;
    margin-bottom:40px;
}

/* INPUT */

.input-box{
    position:relative;
    margin-bottom:28px;
}

.input-box input{
    width:100%;
    height:78px;

    border-radius:24px;

    border:2px solid #00ff66;

    background:#020202;

    color:#00ff66;

    font-size:1.5rem;

    padding:0 24px;

    outline:none;

    transition:.3s;

    box-shadow:
    inset 0 0 15px rgba(0,255,100,.12),
    0 0 12px rgba(0,255,100,.15);
}

.input-box input:focus{

    transform:scale(1.015);

    box-shadow:
    0 0 22px rgba(0,255,100,.45),
    inset 0 0 15px rgba(0,255,100,.18);
}

/* BUTTON */

.btn{
    width:100%;
    height:95px;

    border:none;

    border-radius:26px;

    background:linear-gradient(
        90deg,
        #c43cff,
        #ff00d9,
        #b67cff
    );

    color:#000;

    font-size:2rem;
    font-weight:bold;

    cursor:pointer;

    letter-spacing:2px;

    transition:.25s;

    box-shadow:
    0 0 25px rgba(255,0,255,.35),
    inset 0 0 20px rgba(255,255,255,.15);
}

.btn:hover{
    transform:translateY(-4px) scale(1.01);

    box-shadow:
    0 0 35px rgba(255,0,255,.5);
}

/* STATUS */

.status{
    margin-top:30px;

    height:82px;

    border-radius:24px;

    border:1px solid #00ff66;

    background:rgba(0,255,80,.08);

    display:flex;
    justify-content:center;
    align-items:center;

    color:#00ff66;

    font-size:1.25rem;

    text-shadow:0 0 10px #00ff66;

    box-shadow:
    inset 0 0 15px rgba(0,255,100,.12),
    0 0 15px rgba(0,255,100,.12);
}

/* FOOTER */

.footer{
    margin-top:34px;
    text-align:center;

    color:#4f4f4f;

    font-size:1rem;

    letter-spacing:2px;
}

/* MOBILE */

@media(max-width:480px){

    .title h1{
        font-size:2.3rem;
    }

    .btn{
        font-size:1.5rem;
        height:82px;
    }

    .input-box input{
        font-size:1.2rem;
    }

    .status{
        font-size:1rem;
    }

}

</style>
</head>
<body>

<!-- MATRIX -->
<div class="matrix" id="matrix"></div>

<!-- PANEL -->
<div class="panel">

    <div class="title">
        <h1>NEXUS XITER <span>😈</span></h1>
    </div>

    <div class="subtitle">
        SECURE LOGIN SYSTEM
    </div>

    <div class="input-box">
        <input type="text" placeholder="NX-ERBZ-XI9O">
    </div>

    <button class="btn">
        ACCESS GRANTED
    </button>

    <div class="status">
        LOGIN SUCCESSFUL • ACCESS GRANTED
    </div>

    <div class="footer">
        PROTECTED LOGIN SYSTEM v5.0
    </div>

</div>

<script>

/* MATRIX EFFECT */

const matrix = document.getElementById("matrix");

const chars = "01XSUENO";

for(let i = 0; i < 55; i++){

    const column = document.createElement("div");

    column.classList.add("column");

    let text = "";

    for(let j = 0; j < 35; j++){

        text += chars[Math.floor(Math.random()*chars.length)] + "\n";
    }

    column.innerText = text;

    column.style.left = Math.random()*100 + "vw";

    column.style.animationDuration = (Math.random()*8 + 7) + "s";

    column.style.animationDelay = (Math.random()*5) + "s";

    matrix.appendChild(column);
}

</script>

</body>
</html>
