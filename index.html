<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { background: black; color: #00ff41; font-family: monospace; margin: 0; padding: 10px; overflow: hidden; }
        .panel { border: 2px solid #00ff41; border-radius: 10px; padding: 10px; background: rgba(0,0,0,0.9); }
        canvas { position: absolute; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }
        button { width: 100%; background: #00ff41; color: black; border: none; padding: 10px; font-weight: bold; margin-top: 5px; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #113311; }
        #menu { display: none; }
    </style>
</head>
<body>
    <canvas id="ctx"></canvas>
    <div class="panel" id="login">
        <h2 style="text-align:center">NEXUS LOGIN</h2>
        <input type="text" id="key" placeholder="KEY" style="width:90%; padding:10px; margin-bottom:10px;">
        <button onclick="login()">ACESSAR</button>
    </div>

    <div class="panel" id="menu">
        <h2 style="text-align:center">MOD MENU</h2>
        <div class="row"><span>AIMBOT</span><input type="checkbox" onchange="window.Android.onFeatureToggle('aimbot', this.checked)"></div>
        <div class="row"><span>HEADSHOT</span><input type="checkbox" onchange="window.Android.onFeatureToggle('hs', this.checked)"></div>
        <button onclick="location.reload()" style="background: red; color: white;">SAIR</button>
    </div>

    <script>
        function login() {
            // Lógica simples de teste (substitua pela sua API fetch)
            if(document.getElementById('key').value === "1") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('menu').style.display = 'block';
            } else { alert("Key Errada!"); }
        }

        // Matrix Effect
        const c = document.getElementById("ctx");
        const ctx = c.getContext("2d");
        c.height = window.innerHeight; c.width = window.innerWidth;
        const drops = Array(Math.floor(c.width/10)).fill(1);
        setInterval(() => {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, c.width, c.height);
            ctx.fillStyle = "#0F0"; ctx.font = "10px arial";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*10, y*10);
                if(y*10 > c.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    </script>
</body>
</html>
