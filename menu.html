<div id="menu" class="panel">
    <h2>NEXUS MOD MENU</h2>
    
    <div class="row">
        <span>AIMBOT ASSIST</span>
        <label class="switch">
            <input type="checkbox" onchange="send('aimbot', this.checked)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="row">
        <span>AUTO HEADSHOT</span>
        <label class="switch">
            <input type="checkbox" onchange="send('hs', this.checked)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="row">
        <span>SPEED HACK X10</span>
        <label class="switch">
            <input type="checkbox" onchange="send('speed', this.checked)">
            <span class="slider"></span>
        </label>
    </div>

    <div class="row">
        <span>ESP LINE (WALL)</span>
        <label class="switch">
            <input type="checkbox" onchange="send('esp', this.checked)">
            <span class="slider"></span>
        </label>
    </div>

    <button onclick="location.reload()" style="background:transparent; border:1px solid red; color:red; margin-top:15px; font-size: 11px;">DESCONECTAR</button>
</div>
