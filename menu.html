<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #050505; color: #00ff66; font-family: monospace; text-align: center; padding: 15px; }
        .menu-box { border: 2px solid #00ff66; border-radius: 20px; padding: 20px; background: #0d0d0d; box-shadow: 0 0 15px #00ff66; }
        .hack-item { 
            display: flex; justify-content: space-between; align-items: center; 
            margin: 12px 0; padding: 12px; border: 1px solid #222; border-radius: 12px; 
        }
        .btn-act { 
            padding: 10px 18px; border-radius: 8px; border: none; font-weight: bold;
            background: linear-gradient(90deg, #00ff66, #00ffff); color: #000; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="menu-box">
        <h2 style="margin-bottom: 20px; text-shadow: 0 0 10px #00ff66;">NEXUS MENU VIP</h2>
        
        <div class="hack-item">
            <span>FLY HEIGHT</span>
            <button class="btn-act" onclick="Android.inject('FLY', '0x5ff59f4', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-item">
            <span>SPEED SHOOT</span>
            <button class="btn-act" onclick="Android.inject('SPEED', '0x68a10dc', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-item">
            <span>FAST MEDKIT</span>
            <button class="btn-act" onclick="Android.inject('MEDKIT', '0x6a059d0', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-item">
            <span>NO RECOIL</span>
            <button class="btn-act" onclick="Android.inject('RECOIL', '0x6accffc', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>

        <div class="hack-item">
            <span>SCAN ENEMY</span>
            <button class="btn-act" onclick="Android.inject('SCAN', '0x68f0e70', '20 00 80 D2 C0 03 5F D6')">ATIVAR</button>
        </div>
    </div>
</body>
</html>
